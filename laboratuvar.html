    <script>
        function toggleSidebar() { $('#sidebarPanel').toggleClass('-translate-x-full'); $('#sidebarOverlay').toggleClass('hidden'); }
        
        function switchSubTab(idx) {
            $('.tab-btn').removeClass('active bg-indigo-600 text-white').addClass('text-gray-500 hover:text-gray-300');
            $('.tab-btn').eq(idx).addClass('active bg-indigo-600 text-white').removeClass('text-gray-500');
            $('.sub-panel').addClass('hidden').eq(idx).removeClass('hidden');
        }

        // --- EXHAUSTIVE MOLECULAR COORDINATE ENGINE ---
        const MOLECULES = {
            'NaCl (İyonik)':{atoms:[{e:'Na',x:-1.1,y:0,z:0,r:0.95,c:'#a78bfa'},{e:'Cl',x:1.1,y:0,z:0,r:1.1,c:'#22c55e'}],bonds:[],info:'⚠️ Uyarı: NaCl molekül DEĞİLDİR, iyonik örgü yapısıdır. Gösterilen kısım elektrostatik birim hücre kesitidir.'},
            'Su (H₂O)':{atoms:[{e:'O',x:0,y:0,z:0,r:0.66,c:'#ef4444'},{e:'H',x:0.96,y:0.28,z:0,r:0.31,c:'#f1f5f9'},{e:'H',x:-0.26,y:0.96,z:0,r:0.31,c:'#f1f5f9'}],bonds:[[0,1],[0,2]],info:'VSEPR Kuralı: Kırık doğru geometri, bağ açısı 104.5° derecedir.'},
            'CO₂':{atoms:[{e:'C',x:0,y:0,z:0,r:0.77,c:'#94a3b8'},{e:'O',x:-1.16,y:0,z:0,r:0.66,c:'#ef4444'},{e:'O',x:1.16,y:0,z:0,r:0.66,c:'#ef4444'}],bonds:[[0,1,2],[0,2,2]],info:'Doğrusal geometri (180°), apolar molekül yapısı.'},
            'CH₄ (Metan)':{atoms:[{e:'C',x:0,y:0,z:0,r:0.77,c:'#94a3b8'},{e:'H',x:0.63,y:0.63,z:0.63,r:0.31,c:'#f1f5f9'},{e:'H',x:-0.63,y:-0.63,z:0.63,r:0.31,c:'#f1f5f9'},{e:'H',x:0.63,y:-0.63,z:-0.63,r:0.31,c:'#f1f5f9'},{e:'H',x:-0.63,y:0.63,z:-0.63,r:0.31,c:'#f1f5f9'}],bonds:[[0,1],[0,2],[0,3],[0,4]],info:'Düzgün dörtyüzlü (109.5°), sp³ hibritleşmesi.'},
            'NH₃ (Amonyak)':{atoms:[{e:'Base',x:0,y:0,z:0,r:0.75,c:'#3b82f6'},{e:'H',x:0.94,y:0.34,z:0,r:0.31,c:'#f1f5f9'},{e:'H',x:-0.47,y:0.34,z:0.81,r:0.31,c:'#f1f5f9'},{e:'H',x:-0.47,y:0.34,z:-0.81,r:0.31,c:'#f1f5f9'}],bonds:[[0,1],[0,2],[0,3]],info:'Üçgen piramit geometri, bağ açısı yaklaşık 107° derecedir.'},
            'BeH₂ (Berilyum Hidrür)':{atoms:[{e:'Be',x:0,y:0,z:0,r:0.9,c:'#f59e0b'},{e:'H',x:-1.2,y:0,z:0,r:0.31,c:'#f1f5f9'},{e:'H',x:1.2,y:0,z:0,r:0.31,c:'#f1f5f9'}],bonds:[[0,1],[0,2]],info:'Doğrusal geometri (180°), sp hibritleşmesi.'},
            'BH₃ (Bor Trihidrür)':{atoms:[{e:'B',x:0,y:0,z:0,r:0.82,c:'#10b981'},{e:'H',x:0,y:1.2,z:0,r:0.31,c:'#f1f5f9'},{e:'H',x:1.03,y:-0.6,z:0,r:0.31,c:'#f1f5f9'},{e:'H',x:-1.03,y:-0.6,z:0,r:0.31,c:'#f1f5f9'}],bonds:[[0,1],[0,2],[0,3]],info:'Üçgen düzlem geometri, bağ açısı 120° derecedir.'},
            {atoms:[{e:'H',x:-0.6,y:0,z:0,r:0.31,c:'#f1f5f9'},{e:'F',x:0.6,y:0,z:0,r:0.6,c:'#ec4899'}],bonds:[[0,1]],info:'Kuvvetli polar kovalent bağ, moleküller arası hidrojen bağı etkindir.'},
            'H₂':{atoms:[{e:'H',x:-0.37,y:0,z:0,r:0.31,c:'#f1f5f9'},{e:'H',x:0.37,y:0,z:0,r:0.31,c:'#f1f5f9'}],bonds:[[0,1]],info:'Apolar kovalent tekli sigma bağı.'},
            'O₂':{atoms:[{e:'O',x:-0.6,y:0,z:0,r:0.66,c:'#ef4444'},{e:'O',x:0.6,y:0,z:0,r:0.66,c:'#ef4444'}],bonds:[[0,1,2]],info:'Oksijen molekülü. Çift bağ (O=O) parametresi içerir.'},
            'N₂':{atoms:[{e:'N',x:-0.55,y:0,z:0,r:0.75,c:'#3b82f6'},{e:'N',x:0.55,y:0,z:0,r:0.75,c:'#3b82f6'}],bonds:[[0,1,3]],info:'Üçlü güçlü kovalent bağ (N≡N), kırılması yüksek enerji gerektirir.'},
            'HCN':{atoms:[{e:'H',x:-1.6,y:0,z:0,r:0.31,c:'#f1f5f9'},{e:'C',x:-0.6,y:0,z:0,r:0.77,c:'#94a3b8'},{e:'N',x:0.6,y:0,z:0,r:0.75,c:'#3b82f6'}],bonds:[[0,1],[1,2,3]],info:'Doğrusal yapı, üçlü bağ içerir.'},
            'C₂H₆ (Etan)':{atoms:[{e:'C',x:-0.75,y:0,z:0,r:0.77,c:'#94a3b8'},{e:'C',x:0.75,y:0,z:0,r:0.77,c:'#94a3b8'},{e:'H',x:-1.15,y:0.7,z:0.7,r:0.31,c:'#f1f5f9'},{e:'H',x:-1.15,y:-0.7,z:-0.7,r:0.31,c:'#f1f5f9'},{e:'H',x:1.15,y:0.7,z:-0.7,r:0.31,c:'#f1f5f9'},{e:'H',x:1.15,y:-0.7,z:0.7,r:0.31,c:'#f1f5f9'}],bonds:[[0,1],[0,2],[0,3],[1,4],[1,5]],info:'Doymuş hidrokarbon (Alkan), tüm bağlar sigmadır.'},
            'C₂H₄ (Eten)':{atoms:[{e:'C',x:-0.67,y:0,z:0,r:0.77,c:'#94a3b8'},{e:'C',x:0.67,y:0,z:0,r:0.77,c:'#94a3b8'},{e:'H',x:-1.23,y:0.93,z:0,r:0.31,c:'#f1f5f9'},{e:'H',x:-1.23,y:-0.93,z:0,r:0.31,c:'#f1f5f9'},{e:'H',x:1.23,y:0.93,z:0,r:0.31,c:'#f1f5f9'}],bonds:[[0,1,2],[0,2],[0,3],[1,4]],info:'Alken sınıfı ilk üye, bir pi ve bir sigma bağı (C=C).'},
            'C₂H₂ (Etin)':{atoms:[{e:'C',x:-0.6,y:0,z:0,r:0.77,c:'#94a3b8'},{e:'C',x:0.6,y:0,z:0,r:0.77,c:'#94a3b8'},{e:'H',x:-1.66,y:0,z:0,r:0.31,c:'#f1f5f9'},{e:'H',x:1.66,y:0,z:0,r:0.31,c:'#f1f5f9'}],bonds:[[0,1,3],[0,2],[1,3]],info:'Alkin serisi (Asetilen). sp hibritleşmesi gösterir.'},
            'C₆H₆ (Benzen)':{atoms:[{e:'C',x:1.4,y:0,z:0,r:0.77,c:'#94a3b8'},{e:'C',x:0.7,y:1.2,z:0,r:0.77,c:'#94a3b8'},{e:'C',x:-0.7,y:1.2,z:0,r:0.77,c:'#94a3b8'},{e:'C',x:-1.4,y:0,z:0,r:0.77,c:'#94a3b8'},{e:'H',x:2.4,y:0,z:0,r:0.31,c:'#f1f5f9'}],bonds:[[0,1,2],[1,2],[2,3],[3,0],[0,4]],info:'Aromatik halka yapısı, delokalize pi elektron bulutu içerir.'},
            'C₂H₅OH (Etanol)':{atoms:[{e:'C',x:-1,y:0,z:0,r:0.77,c:'#94a3b8'},{e:'C',x:0.4,y:0.5,z:0,r:0.77,c:'#94a3b8'},{e:'O',x:1.3,y:-0.5,z:0,r:0.66,c:'#ef4444'},{e:'H',x:2.1,y:0,z:0,r:0.31,c:'#f1f5f9'}],bonds:[[0,1],[1,2],[2,3]],info:'Etil alkol molekülü. Hidrojen bağı kurma kapasitesi yüksektir.'},
            'CH₃COOH (Asetik Asit)':{atoms:[{e:'C',x:-0.8,y:0,z:0,r:0.77,c:'#94a3b8'},{e:'C',x:0.6,y:0,z:0,r:0.77,c:'#94a3b8'},{e:'O',x:1.2,y:1.1,z:0,r:0.66,c:'#ef4444'},{e:'O',x:1.2,y:-1.1,z:0,r:0.66,c:'#ef4444'},{e:'H',x:2.1,y:-0.8,z:0,r:0.31,c:'#f1f5f9'}],bonds:[[0,1],[1,2,2],[1,3],[3,4]],info:'Sirke asidi. Karboksilli asitlerin kararlı üyesidir.'}
        };
        // Moleküler isimlendirme eşleştirme düzeltmesi
        MOLECULES['HF (Hidrojen Florür)'] = MOLECULES['undefined'];

        let mol3dState = { mol: null, rotX: 0.3, rotY: 0, view: 'ball', rotSpeed: 1, dragging: false, lastX: 0, lastY: 0, animFrame: null };

        function loadMol(name) {
            mol3dState.mol = MOLECULES[name] || MOLECULES['Su (H₂O)'];
            $('#vertical-mouse').parent(); $('#mol3d-label').text(name);
            $('#mol3d-info').text(mol3dState.mol.info || '');
            if(mol3dState.animFrame) cancelAnimationFrame(mol3dState.animFrame);
            drawMol3D();
        }
        function setMolView(v) { mol3dState.view = v; }
        function setRotSpeed(v) { mol3dState.rotSpeed = parseFloat(v); }

        function drawMol3D() {
            const canvas = document.getElementById('mol3d-canvas'); if(!canvas || !mol3dState.mol) return;
            const ctx = canvas.getContext('2d');
            const W = canvas.clientWidth; const H = 400;
            canvas.width = W; canvas.height = H;

            ctx.clearRect(0,0,W,H);
            ctx.fillStyle = '#0f1117'; ctx.fillRect(0,0,W,H);

            const { atoms, bonds } = mol3dState.mol;
            mol3dState.rotY += 0.008 * mol3dState.rotSpeed;

            const cy = Math.cos(mol3dState.rotY), sy = Math.sin(mol3dState.rotY);
            const cx = Math.cos(mol3dState.rotX), sx = Math.sin(mol3dState.rotX);
            const scale = Math.min(W,H) * 0.3;

            function project(atom) {
                let x1 = atom.x * cy + atom.z * sy; let z1 = -atom.x * sy + atom.z * cy;
                let y1 = atom.y * cx - z1 * sx; let z2 = atom.y * sx + z1 * cx;
                return { sx: W/2 + x1 * scale, sy: H/2 - y1 * scale, z: z2, origin: atom };
            }

            const proj = atoms.map(a => project(a));

            // Bağların çizimi
            bonds.forEach(b => {
                let p1 = proj[b[0]], p2 = proj[b[1]]; if(!p1 || !p2) return;
                ctx.beginPath(); ctx.moveTo(p1.sx, p1.sy); ctx.lineTo(p2.sx, p2.sy);
                ctx.strokeStyle = 'rgba(148,163,184,0.5)'; ctx.lineWidth = mol3dState.view === 'wire' ? 1 : 4; ctx.stroke();
            });

            // Atomların derinlik sıralamasıyla çizimi
            proj.sort((a,b) => a.z - b.z).forEach(p => {
                const baseR = mol3dState.view === 'space' ? p.origin.r * 2.2 : p.origin.r * 1.3;
                const r = Math.max(10, baseR * scale * 0.18);

                ctx.beginPath(); ctx.arc(p.sx, p.sy, r, 0, Math.PI*2);
                ctx.fillStyle = p.origin.c; ctx.fill();
                ctx.fillStyle = '#fff'; ctx.font = 'bold 10px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(p.origin.e, p.sx, p.sy);
            });

            mol3dState.animFrame = requestAnimationFrame(drawMol3D);
        }

        // --- AMİNO ASİTLER VE LAB EKİPMANLARI VERİ KÜTÜPHANESİ ---
        const AMINO=[
            {sym:'Gly',name:'Glisin',formula:'C₂H₅NO₂',desc:'En basit amino asit yapısı. R grubu sadece H atomudur.'},
            {sym:'Ala',name:'Alanin',formula:'C₃H₇NO₂',desc:'Metil R grubu içerir. Nonpolar hidrofobik kazanım.'},
            {sym:'Val',name:'Valin',formula:'C₅H₁₁NO₂',desc:'İzopropil R fonksiyonel grubu içeren esansiyel zincir.'}
        ];
        const LABS=[
            {name:'Erlenmayer',icon:'⚗️',use:'Çözelti çalkalama ve titrasyon süreçleri.',safety:'Kırılgan borosilikat cam.'},
            {name:'Büret',icon:'🧪',use:'Hassas hacimsel sıvı damlatma analizleri.',safety:'Musluk sızdırmazlığı kontrol edilmelidir.'}
        ];

        function initDataLists() {
            const ag = $('#amino-grid'); AMINO.forEach(aa => {
                ag.append(`<div class="bg-[#0f1117] p-4 rounded-xl border border-gray-900"><div class="text-xl font-black text-indigo-400 font-['Space_Grotesk']">${aa.sym}</div><div class="text-xs font-bold text-gray-200 mt-1">${aa.name} (${aa.formula})</div><p class="text-[11px] text-gray-500 mt-1">${aa.desc}</p></div>`);
            });
            const lg = $('#lab-grid'); LABS.forEach(l => {
                lg.append(`<div class="bg-[#0f1117] p-4 rounded-xl border border-gray-900"><div class="text-2xl">${l.icon}</div><div class="text-xs font-black text-gray-250 mt-1">${l.name}</div><div class="text-[11px] text-gray-400 mt-1">Kullanım: ${l.use}</div><div class="text-[10px] text-red-400 mt-2 bg-red-500/10 p-1.5 rounded border border-red-500/20">⚠️ ${l.safety}</div></div>`);
            });
        }

        $(document).ready(function() {
            initDataLists();
            
            // Periyodik tablodan gelen bir istek var mı kontrol et
            const urlParams = new URLSearchParams(window.location.search);
            const passedCid = urlParams.get('cid');
            if(passedCid && passedCid == "1") loadMol('H₂');
            else if(passedCid && passedCid == "6") loadMol('C₆H₆ (Benzen)');
            else loadMol('NaCl (İyonik)');

            // Drag mouse event bağları
            const cv = document.getElementById('mol3d-canvas');
            cv.addEventListener('mousedown', e => { mol3dState.dragging = true; mol3dState.lastX = e.clientX; mol3dState.lastY = e.clientY; });
            document.addEventListener('mouseup', () => mol3dState.dragging = false);
            document.addEventListener('mousemove', e => {
                if(!mol3dState.dragging) return;
                mol3dState.rotY += (e.clientX - mol3dState.lastX) * 0.01;
                mol3dState.rotX += (e.clientY - mol3dState.lastY) * 0.01;
                mol3dState.lastX = e.clientX; mol3dState.lastY = e.clientY;
            });
        });
    </script>
</body>
</html>
