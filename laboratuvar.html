<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roni — Kimya Simülasyon Laboratuvarı</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RONI">
    
    <link rel="apple-touch-icon" href="logo.png?v=1.1">
    <link rel="icon" type="image/png" sizes="192x192" href="logo.png?v=1.1">
    <link rel="manifest" href="manifest.json">
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700;800&display=swap">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        :root {
            --bg: #08090f; --sf: #0f1117; --sf2: #161922; --br: #1e2535; --br2: #252d40; --ac: #6366f1; --ac2: #818cf8;
        }
        body { background: var(--bg); color: #f1f5f9; font-family: 'Inter', sans-serif; }
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image: radial-gradient(circle at 1px 1px, rgba(99,102,241,.06) 1px, transparent 0);
            background-size: 28px 28px; pointer-events: none; z-index: 0;
        }
        /* Sürgü (Slider) Tasarımı */
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.8);
        }
    </style>
</head>
<body class="overflow-x-hidden">

    <div class="flex h-screen overflow-hidden relative z-10">
        
        <aside id="sidebarPanel" class="fixed inset-y-0 left-0 z-50 w-64 bg-gray-950 flex flex-col justify-between border-r border-gray-900 transform -translate-x-full transition-transform duration-300 ease-in-out md:translate-x-0 md:static md:h-screen flex-shrink-0">
            <div class="p-5 overflow-y-auto flex-1">
                <div class="flex items-center justify-between mb-8">
                    <div class="flex items-center space-x-3">
                        <div class="bg-gradient-to-br from-amber-400 via-orange-500 to-red-500 text-slate-950 w-10 h-10 rounded-xl flex items-center justify-center text-xl shadow-lg relative">
                            <i class="fas fa-sun animate-[spin_20s_linear_infinite]"></i>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-xl font-black tracking-wider text-white leading-none">RONI</span>
                            <span class="text-[9px] font-bold text-gray-500 tracking-widest mt-0.5 uppercase">Aydınlık Merkezi</span>
                        </div>
                    </div>
                    <button onclick="toggleSidebar()" class="text-gray-400 hover:text-white md:hidden p-2"><i class="fas fa-times text-xl"></i></button>
                </div>
                
                <nav class="space-y-1">
                    <a href="index.html" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-900 hover:text-white font-semibold text-sm transition">
                        <i class="fas fa-chart-pie w-5 text-center"></i> <span>Ana Sayfa</span>
                    </a>
                    <a href="periyodik.html" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-900 hover:text-white font-semibold text-sm transition">
                        <i class="fas fa-table w-5 text-center"></i> <span>Periyodik Tablo</span>
                    </a>
                    <a href="laboratuvar.html" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-900 hover:text-white font-semibold text-sm transition">
                        <i class="fas fa-flask w-5 text-center"></i> <span>3D Araçlar</span>
                    </a>
                    <a href="simulasyon.html" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl bg-indigo-600 text-white font-bold text-sm">
                        <i class="fas fa-laptop-code w-5 text-center"></i> <span>Simülasyonlar</span>
                    </a>
                    <a href="atlas.html" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-900 hover:text-white font-semibold text-sm transition">
                        <i class="fas fa-graduation-cap w-5 text-center"></i> <span>YÖK Atlas</span>
                    </a>
                </nav>
            </div>
            
            <div class="p-5 border-t border-gray-900 flex items-center space-x-3 bg-gray-950/40 flex-shrink-0">
                <div class="w-10 h-10 bg-indigo-950 rounded-full flex items-center justify-center font-black text-indigo-400">M</div>
                <div>
                    <h4 class="text-sm font-bold text-gray-200">Medeni Gökalp</h4>
                    <span class="text-xs text-gray-500">Kimya Öğretmeni</span>
                </div>
            </div>
        </aside>

        <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 z-40 hidden md:hidden"></div>

        <main class="flex-1 flex flex-col overflow-y-auto min-w-0">
            
            <header class="bg-[#08090f]/90 backdrop-blur border-b border-gray-900 px-6 py-4 flex justify-between items-center sticky top-0 z-30">
                <div class="flex items-center space-x-3">
                    <button onclick="toggleSidebar()" class="p-2 -ml-2 text-gray-400 hover:text-white md:hidden">
                        <i class="fas fa-bars text-xl"></i> </button>
                    <h2 class="text-lg md:text-xl font-extrabold text-white tracking-tight">RONI Simülasyon Laboratuvarı</h2>
                </div>
            </header>

            <div class="p-4 md:p-6 max-w-3xl w-full mx-auto space-y-6 flex-1">
                
                <div class="space-y-2">
                    <button onclick="switchDeney('titrasyon')" id="btn-titrasyon" class="w-full text-left bg-indigo-600/10 hover:bg-indigo-600/20 text-indigo-400 font-bold p-3 rounded-xl border border-indigo-500/30 transition flex items-center space-x-3">
                        <i class="fas fa-tint text-indigo-500"></i> <span>Deney: Asit-Baz Titrasyon Düzeneği</span>
                    </button>
                    <button onclick="switchDeney('turnusol')" id="btn-turnusol" class="w-full text-left bg-gray-900 hover:bg-gray-800 text-gray-400 font-semibold p-3 rounded-xl border border-gray-800 transition flex items-center space-x-3">
                        <i class="fas fa-vial text-green-500"></i> <span>Deney: Turnusol İndikatör Testi</span>
                    </button>
                </div>

                <div id="panel-titrasyon" class="bg-[#0f1117] p-6 rounded-2xl border border-gray-900 shadow-2xl space-y-6">
                    <h3 class="font-bold text-base text-gray-200 tracking-tight border-b border-gray-800 pb-3">Mecanik Büret ve Titrasyon Düzeneği</h3>
                    
                    <div class="flex flex-col items-center justify-center py-6 space-y-4">
                        <div class="w-8 h-48 bg-blue-500/20 border-2 border-blue-500/40 rounded-b relative flex items-end">
                            <div class="w-full bg-blue-400/40 transition-all duration-300" style="height: 70%;" id="buret-sivi"></div>
                            <div class="absolute -bottom-6 left-1/2 -translate-x-1/2 w-4 h-6 bg-indigo-600 rounded-sm"></div>
                        </div>
                        
                        <div class="w-2 h-2 bg-blue-400 rounded-full animate-bounce my-2"></div>
                        
                        <div class="w-24 h-24 bg-gray-800 border-2 border-gray-700 rounded-b-3xl rounded-t-md relative flex items-end overflow-hidden">
                            <div id="beher-sivi" class="w-full h-1/2 bg-red-600/60 transition-all duration-500"></div>
                        </div>
                        
                        <div class="w-full max-w-md pt-4">
                            <input type="range" id="ph-slider" min="1" max="14" step="0.1" value="1" class="w-full h-1 bg-gray-800 rounded-lg appearance-none cursor-pointer accent-indigo-500">
                        </div>

                        <div class="bg-black/40 px-4 py-2 rounded-xl border border-gray-900">
                            <span class="text-xs font-mono tracking-wider text-gray-400">Dijital pH: <strong id="ph-display" class="text-red-500 text-sm">1.00</strong></span>
                        </div>
                    </div>
                </div>

                <div id="panel-turnusol" class="bg-[#0f1117] p-6 rounded-2xl border border-gray-900 shadow-2xl space-y-6 hidden">
                    <h3 class="font-bold text-base text-gray-200 tracking-tight border-b border-gray-800 pb-3">Turnusol İndikatör Renk Analiz Tüpü</h3>
                    
                    <div class="flex flex-col items-center justify-center py-4 space-y-6">
                        <div class="flex items-center space-x-3">
                            <button onclick="testEt('asit', '#ef4444')" class="bg-red-950/30 hover:bg-red-900/40 text-red-400 border border-red-900/50 text-xs font-bold px-4 py-2.5 rounded-xl transition shadow">Limon</button>
                            <button onclick="testEt('notr', '#6366f1')" class="bg-gray-900 hover:bg-gray-800 text-gray-400 border border-gray-800 text-xs font-bold px-4 py-2.5 rounded-xl transition shadow">Saf Su</button>
                            <button onclick="testEt('baz', '#1d4ed8')" class="bg-blue-950/30 hover:bg-blue-900/40 text-blue-400 border border-blue-900/50 text-xs font-bold px-4 py-2.5 rounded-xl transition shadow">Amonyak</button>
                        </div>

                        <div class="w-12 h-44 bg-gray-900 border-2 border-gray-800 rounded-b-full relative flex items-end overflow-hidden shadow-inner">
                            <div id="tup-sivi" class="w-full h-1/3 bg-gray-800 transition-all duration-700"></div>
                        </div>

                        <p id="turnusol-text" class="text-xs font-medium text-gray-500 tracking-wide">Numune seçerek tüpe damlatın.</p>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script>
        // Yan Menü Aç/Kapat Fonksiyonu
        function toggleSidebar() { 
            $('#sidebarPanel').toggleClass('-translate-x-full'); 
            $('#sidebarOverlay').toggleClass('hidden'); 
        }

        // Sekme Değiştirme Fonksiyonu
        function switchDeney(tip) {
            if(tip === 'titrasyon') {
                $('#panel-titrasyon').removeClass('hidden');
                $('#panel-turnusol').addClass('hidden');
                $('#btn-titrasyon').addClass('bg-indigo-600/10 text-indigo-400 border-indigo-500/30').removeClass('bg-gray-900 text-gray-400 border-gray-800');
                $('#btn-turnusol').addClass('bg-gray-900 text-gray-400 border-gray-800').removeClass('bg-indigo-600/10 text-indigo-400 border-indigo-500/30');
            } else {
                $('#panel-turnusol').removeClass('hidden');
                $('#panel-titrasyon').addClass('hidden');
                $('#btn-turnusol').addClass('bg-indigo-600/10 text-indigo-400 border-indigo-500/30').removeClass('bg-gray-900 text-gray-400 border-gray-800');
                $('#btn-titrasyon').addClass('bg-gray-900 text-gray-400 border-gray-800').removeClass('bg-indigo-600/10 text-indigo-400 border-indigo-500/30');
            }
        }

        // 1. Deney: Titrasyon Dinamik pH ve Renk Motoru
        $('#ph-slider').on('input', function() {
            const val = parseFloat($(this).val()).toFixed(2);
            $('#ph-display').text(val);
            
            let r, g, b;
            if(val <= 7) {
                // Asit: Kırmızıdan Nötre (Sarı/Açık Yeşil) Geçiş
                let ratio = (val - 1) / 6;
                r = 220 - (ratio * 120);
                g = 38 + (ratio * 160);
                b = 38;
                $('#ph-display').removeClass().addClass('text-red-500 text-sm font-bold');
            } else {
                // Baz: Nötürden Mavi/Mora Geçiş
                let ratio = (val - 7) / 7;
                r = 100 - (ratio * 20);
                g = 198 - (ratio * 150);
                b = 38 + (ratio * 180);
                $('#ph-display').removeClass().addClass('text-blue-500 text-sm font-bold');
            }
            $('#beher-sivi').css('background-color', `rgba(${r}, ${g}, ${b}, 0.6)`);
            
            // Büretteki sıvıyı kontrollü azaltma simülasyonu
            let buretHeight = 70 - ((val - 1) * 4);
            $('#buret-sivi').css('height', `${buretHeight}%`);
        });

        // 2. Deney: Turnusol Renk Analiz Motoru
        function testEt(madde, renk) {
            $('#tup-sivi').css({
                'height': '65%',
                'background-color': renk + '60'
            });
            
            if(madde === 'asit') {
                $('#turnusol-text').html('Limon suyu asidiktir. <span class="text-red-400 font-bold">Turnusol boyasını kırmızıya çevirir.</span>');
            } else if(madde === 'notr') {
                $('#turnusol-text').html('Saf su nötrdür. <span class="text-indigo-400 font-bold">İndikatör rengini değiştirmez.</span>');
            } else {
                $('#turnusol-text').html('Amonyak baziktir. <span class="text-blue-400 font-bold">Turnusol boyasını maviye çevirir.</span>');
            }
        }
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js');
            });
        }
    </script>

</body>
</html>
