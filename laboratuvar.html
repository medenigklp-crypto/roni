        function generateNaClXYZ() {
            return `27\nNaCl\nNa 0 0 0\nCl 3 0 0\nNa 6 0 0\nCl 0 3 0\nNa 3 3 0\nCl 6 3 0\nNa 0 6 0\nCl 3 6 0\nNa 6 6 0\nCl 0 0 3\nNa 3 0 3\nCl 6 0 3\nNa 0 3 3\nCl 3 3 3\nNa 6 3 3\nCl 0 6 3\nNa 3 6 3\nCl 6 6 3\nNa 0 0 6\nCl 3 0 6\nNa 6 0 6\nCl 0 3 6\nNa 3 3 6\nCl 6 3 6\nNa 0 6 6\nCl 3 6 6\nNa 6 6 6`;
        }

        function handleMoleculeChange(val) {
            if (!viewer) return; viewer.clear();
            let label = $('#molSelector option:selected').text();
            $('#mol3d-label').text(label);

            if (val === "crystal:nacl") {
                $('#mol3d-info').html("<strong>İyonik Kristal Yapısı:</strong> Katyonlar gri ($Na^+$), Anyonlar yeşil ($Cl^-$). Bağ bilgisi içermez, elektrostatik istif örgüsüdür.");
                viewer.addModel(generateNaClXYZ(), "xyz");
                viewer.addBonds([{start:0, end:1},{start:1, end:2},{start:3, end:4},{start:4, end:5},{start:6, end:7},{start:7, end:8},
                                 {start:0, end:3},{start:1, end:4},{start:2, end:5},{start:3, end:6},{start:4, end:7},{start:5, end:8},
                                 {start:9, end:10},{start:10, end:11},{start:12, end:13},{start:13, end:14},{start:14, end:15},
                                 {start:18, end:19},{start:19, end:20},{start:21, end:22},{start:22, end:23},{start:24, end:25}]);
                applyRenderStyle();
            } else if (val.startsWith("local:")) {
                let key = val.replace("local:", "");
                $('#mol3d-info').html("<strong>Müfredat Geometrisi:</strong> ÖSYM kazanımlarına tam uyumlu, yerel bellekten yüklenen kararlı kovalent molekül yapısı.");
                viewer.addModel(LOCAL_MODELS[key], "xyz");
                applyRenderStyle();
            }
        }

        function searchCustomMolecule() {
            let name = $('#customMolInput').val().trim().toLowerCase(); if(!name) return;
            viewer.clear(); $('#mol3d-label').text(name.toUpperCase());
            $('#mol3d-info').html("<i class='fas fa-spinner fa-spin mr-1'></i> Küresel veritabanından çiziliyor...");
            $3Dmol.download("name:" + name, viewer, {}, function() {
                applyRenderStyle();
                $('#mol3d-info').html(`<strong>${name.toUpperCase()} Çizildi!</strong> CPK standartlarında atom renklendirmesi uygulandı.`);
            }, function() {
                $('#mol3d-info').html("❌ Molekül bulunamadı. Lütfen İngilizce yazmayı deneyin (Örn: aspirin, caffeine, glucose).");
            });
        }

        function setRenderStyle(styleName, btn) {
            $('.style-btn').removeClass('active border-indigo-500 text-indigo-400 bg-indigo-500/10');
            $(btn).addClass('active border-indigo-500 text-indigo-400 bg-indigo-500/10');
            currentStyle = styleName; applyRenderStyle();
        }
        
        function applyRenderStyle() {
            if (!viewer) return; let config = {};
            if (currentStyle === 'ball') config = { stick: { radius: 0.15 }, sphere: { scale: 0.28 } };
            else if (currentStyle === 'space') config = { sphere: { scale: 0.8 } };
            else if (currentStyle === 'line') config = { line: { linewidth: 3 }, stick: { radius: 0.05 } };
            viewer.setStyle({}, config); viewer.render(); viewer.zoomTo();
        }

            {name:'Mezür (Dereceli Silindir)',icon:'🧪',use:'Sıvıların hacmini kabaca ölçmek için kullanılan dereceli kap.'},
            {name:'Spatül',icon:'🥄',use:'Katı kimyasal tozları şişesinden almak için kullanılan metal/plastik kaşık.'},
            {name:'Ayırma Hunisi',icon:'⚗️',use:'Heterojen sıvı-sıvı (Örn: zeytinyağı-su) karışımlarını yoğunluk farkıyla ayıran musluklu huni.'}

        $(document).ready(function() {

            // Listeleri basıyoruz
            AMINO.forEach(aa => {
                $('#amino-grid').append(`<div class="bg-[#0f1117] p-4 rounded-xl border border-gray-900 shadow-md"><div class="text-2xl font-black text-indigo-400 font-['Space_Grotesk']">${aa.sym}</div><div class="text-xs font-bold text-gray-200 mt-1">${aa.name} (${aa.formula})</div><p class="text-[11px] text-gray-500 mt-1 leading-relaxed">${aa.desc}</p></div>`);

            LABS.forEach(l => {
