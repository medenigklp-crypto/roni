<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roni — Cam Araçlar, Moleküller ve Amino Asitler</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://3dmol.org/build/3Dmol-min.js"></script>
    <style>
        :root { --bg: #08090f; --sf: #0f1117; --ac: #6366f1; }
        body { background: var(--bg); color: #f1f5f9; font-family: 'Inter', sans-serif; }
        body::before { content: ''; position: fixed; inset: 0; background-image: radial-gradient(circle at 1px 1px, rgba(99,102,241,.06) 1px, transparent 0); background-size: 28px 28px; pointer-events: none; z-index: 0; }
        .tab-btn.active { background: var(--ac); color: white; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #252d40; border-radius: 3px; }
    </style>
</head>
<body class="overflow-x-hidden custom-scrollbar">
    <div class="flex h-screen overflow-hidden relative z-10">
        <aside id="sidebarPanel" class="fixed inset-y-0 left-0 z-[100] w-64 bg-gray-950 flex flex-col justify-between border-r border-gray-900 transform -translate-x-full transition-transform duration-300 ease-in-out md:translate-x-0 md:static md:h-screen flex-shrink-0">
            <div class="p-5 overflow-y-auto flex-1 custom-scrollbar">
                <div class="flex items-center space-x-3 mb-8">
                    <div class="bg-gradient-to-br from-amber-400 via-orange-500 to-red-500 text-slate-950 w-10 h-10 rounded-xl flex items-center justify-center text-xl shadow-lg relative"><i class="fas fa-sun animate-[spin_20s_linear_infinite]"></i></div>
                    <span class="text-xl font-black text-white">RONI</span>
                </div>
                <nav class="space-y-1">
                    <a href="index.html" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 font-semibold text-sm transition"><i class="fas fa-chart-pie w-5 text-center"></i> <span>Ana Sayfa</span></a>
                    <a href="periyodik.html" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 font-semibold text-sm transition"><i class="fas fa-table w-5 text-center"></i> <span>Periyodik Tablo</span></a>
                    <a href="laboratuvar.html" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl bg-indigo-600 text-white font-bold text-sm"><i class="fas fa-flask w-5 text-center"></i> <span>3D Araçlar</span></a>
                </nav>
            </div>
            <div class="p-5 border-t border-gray-800 flex items-center space-x-3 bg-gray-950/40">
                <div class="w-10 h-10 bg-indigo-950 rounded-full flex items-center justify-center font-black text-indigo-400">M</div>
                <div><h4 class="text-sm font-bold text-gray-200">Medeni Gökalp</h4><span class="text-xs text-gray-500">Kimya Öğretmeni</span></div>
            </div>
        </aside>
        <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 z-40 hidden"></div>

        <main class="flex-1 flex flex-col overflow-y-auto min-w-0">
            <header class="bg-[#08090f]/90 border-b border-gray-900 px-6 py-4 flex justify-between items-center sticky top-0 z-30">
                <div class="flex items-center space-x-3"><button onclick="toggleSidebar()" class="p-2 -ml-2 text-gray-400 hover:text-white md:hidden"><i class="fas fa-bars text-xl"></i></button><h2 class="text-lg md:text-xl font-extrabold text-white">🧬 Roni 3D Kimya Laboratuvarı</h2></div>
            </header>

            <div class="p-4 md:p-6 max-w-7xl w-full mx-auto space-y-6 flex-1">
                <div class="flex bg-[#0f1117] p-1 rounded-xl border border-gray-900 shrink-0">
                    <button onclick="switchSubTab(0)" class="tab-btn active flex-1 text-center py-2.5 text-xs font-bold rounded-lg">🔬 3D Molekül Motoru</button>
                    <button onclick="switchSubTab(1)" class="tab-btn flex-1 text-center py-2.5 text-xs font-bold rounded-lg text-gray-500">🧬 20 Amino Asit</button>
                    <button onclick="switchSubTab(2)" class="tab-btn flex-1 text-center py-2.5 text-xs font-bold rounded-lg text-gray-500">🧪 Temel Malzemeler</button>
                </div>

                <div id="subTabPanels">
                    <div class="sub-panel space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div class="bg-[#0f1117] p-4 rounded-xl border border-gray-900 space-y-3">
                                <select id="molSelector" onchange="handleMoleculeChange(this.value)" class="w-full bg-[#161922] p-2.5 text-xs font-bold rounded-xl border border-gray-800 text-indigo-400"><option value="local:CH4">CH₄ (Metan)</option><option value="local:H2O">H₂O (Su)</option><option value="local:CO2">CO₂ (Karbondioksit)</option></select>
                            </div>
                            <div class="md:col-span-2 bg-[#020617] rounded-xl border border-gray-900 relative min-h-[400px]"><div id="molecule-viewer" class="w-full h-full absolute inset-0"></div></div>
                        </div>
                    </div>
                    <div class="sub-panel hidden grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4" id="amino-grid"></div>
                    <div class="sub-panel hidden grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4" id="lab-grid"></div>
                </div>
            </div>
        </main>
    </div>

    <div id="equipmentModal" class="fixed inset-0 bg-black/80 z-[200] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-[#0f1117] border border-gray-800 rounded-2xl max-w-lg w-full p-6 relative flex flex-col space-y-4">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-500 hover:text-white p-2 text-lg"><i class="fas fa-times"></i></button>
            <div class="flex justify-center bg-[#08090f] p-6 rounded-xl border border-gray-900/60" id="modalVisual"></div>
            <h3 id="modalName" class="text-lg font-black text-indigo-400 font-['Space_Grotesk']">Malzeme</h3>
            <p id="modalUse" class="text-xs text-gray-300 bg-[#161922] p-3 rounded-xl border border-gray-800 shadow-inner"></p>
        </div>
    </div>

    <script>
        let viewer = null;
        function toggleSidebar() { $('#sidebarPanel').toggleClass('-translate-x-full'); $('#sidebarOverlay').toggleClass('hidden'); }
        function switchSubTab(idx) { $('.tab-btn').removeClass('active bg-indigo-600 text-white').addClass('text-gray-500'); $('.tab-btn').eq(idx).addClass('active bg-indigo-600 text-white'); $('.sub-panel').addClass('hidden').eq(idx).removeClass('hidden'); }
        
        const LOCAL_MODELS = { "CH4": "5\nMethane\nC 0 0 0\nH 0.63 0.63 0.63\nH -0.63 -0.63 0.63\nH -0.63 0.63 -0.63\nH 0.63 -0.63 -0.63", "H2O": "3\nWater\nO 0 0 0.11\nH 0 0.75 -0.46\nH 0 -0.75 -0.46", "CO2": "3\nCO2\nC 0 0 0\nO 0 0 1.16\nO 0 0 -1.16" };
        function handleMoleculeChange(val) { if (!viewer) return; viewer.clear(); let key = val.replace("local:", ""); viewer.addModel(LOCAL_MODELS[key], "xyz"); viewer.setStyle({},{stick:{radius:0.15},sphere:{scale:0.25}}); viewer.render(); viewer.zoomTo(); }

        const AMINO = [
            {sym:'Gly',name:'Glisin',formula:'C₂H₅NO₂',desc:'En basit amino asit. Yan zinciri sadece tek bir Hidrojendir.'},
            {sym:'Ala',name:'Alanin',formula:'C₃H₇NO₂',desc:'Metil yan zinciri içerir. Hidrofobik yapıdadır.'},
            {sym:'Cys',name:'Sistein',formula:'C₃H₇NO₂S',desc:'Tiyol (-SH) grubu içerir, disülfit bağları kurarak protein bükülmelerini korur.'},
            {sym:'Val',name:'Valin',formula:'C₅H₁₁NO₂',desc:'Dallı zincirli esansiyel bir amino asittir.'},
            {sym:'Leu',name:'Lösin',formula:'C₆H₁₃NO₂',desc:'Protein sentezi uyarıcı esansiyel hidrofobik zincir.'},
            {sym:'Ser',name:'Serin',formula:'C₃H₇NO₃',desc:'Yan zincirinde reaktif Hidroksil (-OH) grubu taşır.'},
            {sym:'Thr',name:'Treonin',formula:'C₄H₉NO₃',desc:'Hidroksil grubu taşıyan polar esansiyel amino asit.'},
            {sym:'Met',name:'Metionin',formula:'C₅H₁₁NO₂S',desc:'Kükürt içeren başlatıcı (initiation) amino asididir.'},
            {sym:'Phe',name:'Fenilalanin',formula:'C₉H₁₁NO₂',desc:'Aromatik fenil halkası içerir. Esansiyel yapıdadır.'},
            {sym:'Tyr',name:'Tirozin',formula:'C₉H₁₁NO₃',desc:'Fenil halkasına bağlı hidroksil taşır. Dopamin öncülüdür.'},
            {sym:'Trp',name:'Triptofan',formula:'C₁₁H₁₂N₂O₂',desc:'İndol halkalı çift halkaya sahip en büyük amino asittir.'},
            {sym:'Asp',name:'Aspartik Asit',formula:'C₄H₇NO₄',desc:'Karboksil grubu taşır. Negatif yüklüdür.'},
            {sym:'Glu',name:'Glutamik Asit',formula:'C₅H₉NO₄',desc:'Beyinde nörotransmitter işlevi gören asidik yapı.'},
            {sym:'Lys',name:'Lizin',formula:'C₆H₁₄N₂O₂',desc:'Yan zincirinde amino grubu taşır. Pozitif yüklüdür.'},
            {sym:'Arg',name:'Arjinin',formula:'C₆H₁₄N₄O₂',desc:'Guanidinyum grubu içeren en bazik amino asit.'},
            {sym:'His',name:'Histidin',formula:'C₆H₉N₃O₂',desc:'İmidazol halkası içerir. Fizyolojik pH tamponudur.'},
            {sym:'Asn',name:'Asparagin',formula:'C₄H∸N₂O₃',desc:'Karboksamid yan zinciri taşır. Yüksüzdür.'},
            {sym:'Gln',name:'Glutamin',formula:'C₅H₁₀N₂O₃',desc:'Kanda en bol bulunan serbest amino asit formu.'},
            {sym:'Pro',name:'Prolin',formula:'C₅H₉NO₂',desc:'Halkasal ikincil amin yapısı, protein zincir bükülmelerine yol açar.'}
        ];

        const LABS = [
            {name:'Beherglas',use:'Sıvıların karıştırılması, ısıtılması ve çözelti hazırlanmasında kullanılan geniş cam kaptır.',svg:`<svg width="60" height="70" viewBox="0 0 80 90" fill="none" stroke="#818cf8" stroke-width="3"><path d="M15 15 L12 18 L12 80 Q12 85 20 85 L60 85 Q68 85 68 80 L68 15 Z" fill="rgba(129,102,241,0.05)"/></svg>`},
            {name:'Erlenmayer',use:'Konik yapısı sayesinde çözelti saklama ve titrasyon işlemlerinde kullanılan dar boyunlu cam kaptır.',svg:`<svg width="60" height="70" viewBox="0 0 80 90" fill="none" stroke="#818cf8" stroke-width="3"><path d="M33 15 L47 15 L47 30 L72 80 Q75 85 65 85 L15 85 Q5 85 8 80 L33 30 Z" fill="rgba(129,102,241,0.05)"/></svg>`},
            {name:'Balon Joje',use:'Belli derişimlerdeki hassas molar çözeltilerin hazırlanması ve saklanmasında kullanılan uzun boyunlu balondur.',svg:`<svg width="60" height="70" viewBox="0 0 80 90" fill="none" stroke="#818cf8" stroke-width="3"><path d="M36 15 L44 15 L44 45 L62 75 Q66 82 58 82 L22 82 Q14 82 18 75 L36 45 Z" fill="rgba(129,102,241,0.05)"/><line x1="36" y1="30" x2="44" y2="30" stroke="#ef4444" stroke-width="2"/></svg>`},
            {name:'Ayırma Hunisi',use:'Sıvı-sıvı heterojen karışımları (Örn: zeytinyağı-su) yoğunluk farkına dayanarak ayıran musluklu cam gövdedir.',svg:`<svg width="60" height="70" viewBox="0 0 80 90" fill="none" stroke="#818cf8" stroke-width="3"><path d="M40 12 Q65 25 60 50 L44 72 L44 85 L36 85 L36 72 L20 50 Q15 25 40 12 Z" fill="rgba(129,102,241,0.05)"/><circle cx="40" cy="76" r="3" fill="#ef4444" stroke="none"/></svg>`}
        ];

        function openModal(idx) { const mat = LABS[idx]; $('#modalVisual').html(mat.svg); $('#modalName').text(mat.name); $('#modalUse').text(mat.use); $('#equipmentModal').removeClass('hidden'); }
        function closeModal() { $('#equipmentModal').addClass('hidden'); }

        $(document).ready(function() {
            viewer = $3Dmol.createViewer($('#molecule-viewer'), { backgroundColor: '#020617' });
            handleMoleculeChange("local:CH4");
            AMINO.forEach(aa => { $('#amino-grid').append(`<div class="bg-[#0f1117] p-4 rounded-xl border border-gray-900 shadow-md"><div class="text-2xl font-black text-indigo-400 font-['Space_Grotesk']">${aa.sym}</div><div class="text-xs font-bold text-gray-200 mt-1">${aa.name}</div><p class="text-[11px] text-gray-500 mt-1 leading-relaxed">${aa.desc}</p></div>`); });
            LABS.forEach((l, idx) => { $('#lab-grid').append(`<div onclick="openModal(${idx})" class="bg-[#0f1117] p-4 rounded-xl border border-gray-900 hover:border-indigo-500 transition-all cursor-pointer flex flex-col items-center justify-between shadow-md text-center"><div class="p-2 bg-gray-950 rounded-xl border border-gray-900">${l.svg}</div><div class="text-xs font-black text-gray-200 mt-2">${l.name}</div></div>`); });
            $('#equipmentModal').click(function(e) { if(e.target === this) closeModal(); });
        });
    </script>
</body>
</html>
