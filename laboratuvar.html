<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roni — 3D Laboratuvar ve Araçlar</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RONI">
    <link rel="apple-touch-icon" href="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/512x512/2600.png">
    <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/512x512/2600.png">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700;800&display=swap">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://3dmol.org/build/3Dmol-min.js"></script>

    <style>
        :root { --bg: #08090f; --sf: #0f1117; --sf2: #161922; --br: #1e2535; --ac: #6366f1; --ac2: #818cf8; }
        body { background: var(--bg); color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: var(--br); border-radius: 3px; }
        .tab-btn.active { background: var(--ac); color: white; }
        .style-btn.active { border-color: var(--ac); color: var(--ac2); background: rgba(99,102,241,0.12); }
    </style>
</head>
<body class="overflow-x-hidden custom-scrollbar">

    <div class="flex h-screen overflow-hidden relative z-10">
        
        <aside id="sidebarPanel" class="fixed inset-y-0 left-0 z-[100] w-64 bg-gray-950 flex flex-col justify-between border-r border-gray-900 transform -translate-x-full transition-transform duration-300 ease-in-out md:translate-x-0 md:static md:h-screen flex-shrink-0">
            <div class="p-5 overflow-y-auto flex-1 custom-scrollbar">
                <div class="flex items-center justify-between mb-8">
                    <div class="flex items-center space-x-3">
                        <div class="bg-gradient-to-br from-amber-400 via-orange-500 to-red-500 text-slate-950 w-10 h-10 rounded-xl flex items-center justify-center text-xl shadow-lg relative">
                            <i class="fas fa-sun animate-[spin_20s_linear_infinite]"></i>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-xl font-black tracking-wider text-white leading-none">RONI</span>
                            <span class="text-[9px] font-bold text-gray-500 tracking-widest mt-0.5 uppercase">Aydınlık Merkezi</span>
                        </div>
                    </div>
                    <button onclick="toggleSidebar()" class="text-gray-400 hover:text-white md:hidden p-2"><i class="fas fa-times text-xl"></i></button>
                </div>
                <nav class="space-y-1">
                    <a href="index.html" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400">Ana Sayfa</a>
                    <a href="periyodik.html" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400">Periyodik Tablo</a>
                    <a href="laboratuvar.html" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl bg-indigo-600 text-white font-bold text-sm">3D Araçlar</a>
                    <a href="simulasyon.html" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400">Simülasyonlar</a>
                    <a href="atlas.html" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400">YÖK Atlas</a>
                </nav>
            </div>
        </aside>

        <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 z-40 hidden md:hidden"></div>

        <main class="flex-1 flex flex-col overflow-y-auto min-w-0">
            <header class="bg-[#08090f]/90 backdrop-blur border-b border-gray-900 px-6 py-4 flex justify-between items-center sticky top-0 z-30">
                <div class="flex items-center space-x-3">
                    <button onclick="toggleSidebar()" class="p-2 -ml-2 text-gray-400 hover:text-white md:hidden"><i class="fas fa-bars text-xl"></i></button>
                    <h2 class="text-lg md:text-xl font-extrabold text-white tracking-tight">Roni 3D Laboratuvarı</h2>
                </div>
            </header>

            <div class="p-4 md:p-6 max-w-7xl w-full mx-auto space-y-6 flex-1">
                <div class="flex bg-[#0f1117] p-1 rounded-xl border border-gray-900">
                    <button onclick="switchSubTab(0)" class="tab-btn active flex-1 text-center py-2.5 text-xs font-bold rounded-lg transition-all">🔬 3D Molekül Motoru</button>
                    <button onclick="switchSubTab(1)" class="tab-btn flex-1 text-center py-2.5 text-xs font-bold rounded-lg transition-all text-gray-500">🧬 Amino Asitler</button>
                </div>

                <div id="subTabPanels">
                    <div class="sub-panel space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div class="md:col-span-1 bg-[#0f1117] p-4 rounded-xl border border-gray-900 space-y-4">
                                <div>
                                    <label class="text-[10px] font-bold text-gray-500 uppercase block mb-1">Model Seçimi:</label>
                                    <select id="molSelector" onchange="handleMoleculeChange(this.value)" class="w-full bg-[#161922] p-2.5 text-xs font-bold rounded-xl border border-gray-800 text-indigo-400 focus:outline-none">
                                        <option value="crystal:nacl">NaCl (İyonik Kristal Örgüsü)</option>
                                        <option value="cid:962">H₂O (Su Molekülü)</option>
                                        <option value="cid:280">CO₂ (Karbondioksit)</option>
                                        <option value="cid:291">CH₄ (Metan)</option>
                                        <option value="cid:947">N₂ (Azot Gazı - Üçlü Bağ)</option>
                                    </select>
                                </div>
                                <div class="grid grid-cols-3 gap-2">
                                    <button onclick="setRenderStyle('ball', this)" class="style-btn active bg-[#161922] py-2 rounded text-[10px] font-bold border border-gray-800">Top-Çubuk</button>
                                    <button onclick="setRenderStyle('space', this)" class="style-btn bg-[#161922] py-2 rounded text-[10px] font-bold border border-gray-800">Uzay Dolgu</button>
                                    <button onclick="setRenderStyle('line', this)" class="style-btn bg-[#161922] py-2 rounded text-[10px] font-bold border border-gray-800">Tel Kafes</button>
                                </div>
                            </div>
                            
                            <div class="md:col-span-2 bg-[#020617] rounded-xl border border-gray-900 relative min-h-[440px] overflow-hidden">
                                <div id="molecule-viewer" class="w-full h-full absolute inset-0"></div>
                                <div class="absolute bottom-4 left-4 right-4 bg-gray-950/80 p-3 rounded-xl border border-gray-800/40 z-10 text-xs text-gray-400">
                                    <span id="mol3d-label" class="font-bold text-white block text-sm mb-1">NaCl (Kristal Örgü)</span>
                                    <p id="mol3d-info">İyonik kristal kafes birim hücre modeli. Katyon ve anyonların elektrostatik çekim istifidir.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="sub-panel hidden grid grid-cols-1 md:grid-cols-3 gap-4" id="amino-grid"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let viewer = null; let currentStyle = 'ball';
        function switchSubTab(idx) { $('.tab-btn').removeClass('active bg-indigo-600 text-white').addClass('text-gray-500'); $('.tab-btn').eq(idx).addClass('active bg-indigo-600 text-white'); $('.sub-panel').addClass('hidden').eq(idx).removeClass('hidden'); }
        
        function generateNaClXYZ() {
            let s = "27\nNaCl Lattice\n";
            for(let x=-1; x<=1; x++) {
                for(let y=-1; y<=1; y++) {
                    for(let z=-1; z<=1; z++) {
                        let isNa = (x + y + z) % 2 === 0;
                        s += `${isNa ? 'Na' : 'Cl'} ${x*3.0} ${y*3.0} ${z*3.0}\n`;
                    }
                }
            }
            return s;
        }

        function handleMoleculeChange(val) {
            if (!viewer) return; viewer.clear();
            if (val === "crystal:nacl") {
                $('#mol3d-label').text("NaCl (Kübik Birim Hücre Örgüsü)");
                $('#mol3d-info').html("⚠️ <strong>ÖSYM Notu:</strong> İyonik yapılar molekül oluşturmaz, kristal kafes yapısındadır.");
                viewer.addModel(generateNaClXYZ(), "xyz"); applyRenderStyle();
            } else {
                let cid = val.replace("cid:", "");
                $('#mol3d-label').text($('#molSelector option:selected').text());
                $('#mol3d-info').text("Kovalent bağ yapısı. Orbitallerin elektron ortaklaşması ile kurulan molekül geometrisidir.");
                $3Dmol.download("cid:" + cid, viewer, {}, function() { applyRenderStyle(); });
            }
        }

        function setRenderStyle(styleName, btn) { $('.style-btn').removeClass('active border-indigo-500 text-indigo-400 bg-indigo-500/10'); $(btn).addClass('active border-indigo-500 text-indigo-400 bg-indigo-500/10'); currentStyle = styleName; applyRenderStyle(); }
        
        function applyRenderStyle() {
            if (!viewer) return; let styleConfig = {};
            if (currentStyle === 'ball') styleConfig = { stick: { radius: 0.15 }, sphere: { scale: 0.25 } };
            else if (currentStyle === 'space') styleConfig = { sphere: { scale: 0.8 } };
            else if (currentStyle === 'line') styleConfig = { line: {} };
            viewer.setStyle({}, styleConfig); viewer.render(); viewer.zoomTo();
        }

        $(document).ready(function() {
            viewer = $3Dmol.createViewer($('#molecule-viewer'), { backgroundColor: '#020617' });
            handleMoleculeChange("crystal:nacl");
            const AMINO=['Glisin (C₂H₅NO₂)','Alanin (C₃H₇NO₂)','Sistein (C₃H₇NO₂S)'];
            AMINO.forEach(a => { $('#amino-grid').append(`<div class="bg-[#0f1117] p-4 rounded-xl border border-gray-900 text-xs font-bold text-indigo-400">${a}</div>`); });
        });
    </script>
</body>
</html>
