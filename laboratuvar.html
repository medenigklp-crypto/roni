<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roni — 3D Laboratuvar ve Araçlar</title>
    
    <!-- iPHONE ANA EKRAN İKONU VE TAM EKRAN (PWA) AYARLARI -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RONI">
    <link rel="apple-touch-icon" href="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/512x512/2600.png">
    <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/512x512/2600.png">

    <!-- Google Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700;800&display=swap">
    <!-- Tailwind CSS & FontAwesome CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- JQuery ve Güçlü WebGL 3Dmol.js Kütüphaneleri -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://3dmol.org/build/3Dmol-min.js"></script>

    <style>
        :root {
            --bg: #08090f; --sf: #0f1117; --sf2: #161922; --sf3: #1c2030;
            --br: #1e2535; --br2: #252d40; --ac: #6366f1; --ac2: #818cf8;
            --gr: #22c55e; --rd: #ef4444; --yw: #f59e0b; --cy: #06b6d4;
            --tx: #f1f5f9; --tx2: #94a3b8; --tx3: #475569;
        }
        body { background: var(--bg); color: var(--tx); font-family: 'Inter', sans-serif; }
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image: radial-gradient(circle at 1px 1px, rgba(99,102,241,.06) 1px, transparent 0);
            background-size: 28px 28px; pointer-events: none; z-index: 0;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: var(--br2); border-radius: 3px; }
        .tab-btn.active { background: var(--ac); color: white; }
    </style>
</head>
<body class="overflow-x-hidden custom-scrollbar">

    <div class="flex h-screen overflow-hidden relative z-10">
        
        <!-- SIDEBAR MENÜ PANELİ -->
        <aside id="sidebarPanel" class="fixed inset-y-0 left-0 z-50 w-64 bg-gray-950 flex flex-col justify-between border-r border-gray-900 transform -translate-x-full transition-transform duration-300 ease-in-out md:translate-x-0 md:static md:h-screen flex-shrink-0">
            <div class="p-5 overflow-y-auto flex-1 custom-scrollbar">
                <div class="flex items-center justify-between mb-8">
                    <!-- PARLAYAN GÜNEŞ LOGO -->
                    <div class="flex items-center space-x-3">
                        <div class="bg-gradient-to-br from-amber-400 via-orange-500 to-red-500 text-slate-950 w-10 h-10 rounded-xl flex items-center justify-center text-xl shadow-lg shadow-orange-500/20 relative group">
                            <div class="absolute inset-0 bg-orange-400 rounded-xl blur-md opacity-40 group-hover:opacity-75 transition-opacity"></div>
                            <i class="fas fa-sun relative z-10 animate-[spin_20s_linear_infinite]"></i>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-orange-400 leading-none">RONI</span>
                            <span class="text-[9px] font-bold text-gray-500 tracking-widest mt-0.5 uppercase">Aydınlık Merkezi</span>
                        </div>
                    </div>
                    <button onclick="toggleSidebar()" class="text-gray-400 hover:text-white md:hidden p-2"><i class="fas fa-times text-xl"></i></button>
                </div>
                
                <nav class="space-y-1">
                    <a href="index.html" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-900 hover:text-white font-semibold text-sm transition">
                        <i class="fas fa-chart-pie w-5 text-center"></i> <span>Ana Sayfa</span>
                    </a>
                    <a href="periyodik.html" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-900 hover:text-white font-semibold text-sm transition">
                        <i class="fas fa-table w-5 text-center"></i> <span>Periyodik Tablo</span>
                    </a>
                    <a href="laboratuvar.html" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl bg-indigo-600 text-white font-bold text-sm">
                        <i class="fas fa-flask w-5 text-center"></i> <span>3D Araçlar</span>
                    </a>
                    <a href="simulasyon.html" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-900 hover:text-white font-semibold text-sm transition">
                        <i class="fas fa-laptop-code w-5 text-center"></i> <span>Simülasyonlar</span>
                    </a>
                    <a href="atlas.html" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-900 hover:text-white font-semibold text-sm transition">
                        <i class="fas fa-graduation-cap w-5 text-center"></i> <span>YÖK Atlas</span>
                    </a>
                </nav>
            </div>
            
            <div class="p-5 border-t border-gray-800 flex items-center space-x-3 bg-gray-950/40 flex-shrink-0">
                <div class="w-10 h-10 bg-indigo-950 rounded-full flex items-center justify-center font-black text-indigo-400">M</div>
                <div><h4 class="text-sm font-bold text-gray-200">Medeni Gökalp</h4><span class="text-xs text-gray-500">Kimya Öğretmeni</span></div>
            </div>
        </aside>

        <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 z-40 hidden md:hidden"></div>

        <!-- ANA İÇERİK PORTAL ALANI -->
        <main class="flex-1 flex flex-col overflow-y-auto min-w-0">
            <header class="bg-[#08090f]/90 backdrop-blur border-b border-gray-900 px-6 py-4 flex justify-between items-center sticky top-0 z-30">
                <div class="flex items-center space-x-3">
                    <button onclick="toggleSidebar()" class="p-2 -ml-2 text-gray-400 hover:text-white md:hidden"><i class="fas fa-bars text-xl"></i></button>
                    <h2 class="text-lg md:text-xl font-extrabold text-white tracking-tight">🧬 Roni 3D Kimya Laboratuvarı</h2>
                </div>
            </header>

            <div class="p-4 md:p-6 max-w-7xl w-full mx-auto space-y-6 flex-1">
                
                <!-- Üst Alt Modül Sekmeleri -->
                <div class="flex bg-[#0f1117] p-1 rounded-xl border border-gray-900">
                    <button onclick="switchSubTab(0)" class="tab-btn active flex-1 text-center py-2.5 text-xs font-bold rounded-lg transition-all">🔬 3D Molekül Motoru</button>
                    <button onclick="switchSubTab(1)" class="tab-btn flex-1 text-center py-2.5 text-xs font-bold rounded-lg transition-all text-gray-500 hover:text-gray-300">🧬 Amino Asit Kataloğu</button>
                    <button onclick="switchSubTab(2)" class="tab-btn flex-1 text-center py-2.5 text-xs font-bold rounded-lg transition-all text-gray-500 hover:text-gray-300">🧪 Laboratuvar Ekipmanları</button>
                </div>

                <!-- SUB SEKMELER İÇERİĞİ -->
                <div id="subTabPanels">
                    
                    <!-- PANEL 0: 3D MOLEKÜL GÖRÜNTÜLEYİCİ -->
                    <div class="sub-panel space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div class="md:col-span-1 bg-[#0f1117] p-4 rounded-xl border border-gray-900 space-y-4">
                                <div>
                                    <label class="text-[10px] font-bold text-gray-500 uppercase block mb-1">Müfredat Yapısı Seçimi:</label>
                                    <select id="molSelector" onchange="handleMoleculeChange(this.value)" class="w-full bg-[#161922] p-2.5 text-xs font-bold rounded-xl border border-gray-800 text-indigo-400 focus:outline-none">
                                        <optgroup label="İyonik Kristal Yapılar">
                                            <option value="crystal:nacl">NaCl (Kübik Birim Hücre Örgüsü)</option>
                                        </optgroup>
                                        <optgroup label="Temel Kovalent Moleküller">
                                            <option value="cid:280">CO₂ (Karbondioksit)</option>
                                            <option value="cid:291">CH₄ (Metan)</option>
                                            <option value="cid:222">NH₃ (Amonyak)</option>
                                            <option value="cid:962">H₂O (Su)</option>
                                            <option value="cid:24784">BeH₂ (Berilyum Hidrür)</option>
                                            <option value="cid:5462312">BH₃ (Bor Trihidrür)</option>
                                            <option value="cid:14917">HF (Hidrojen Florür)</option>
                                            <option value="cid:783">H₂ (Hidrojen Gazı)</option>
                                            <option value="cid:977">O₂ (Oksijen Gazı)</option>
                                            <option value="cid:947">N₂ (Azot Gazı)</option>
                                            <option value="cid:768">HCN (Hidrojen Siyanür)</option>
                                            <option value="cid:6324">C₂H₆ (Etan)</option>
                                            <option value="cid:6325">C₂H₄ (Eten / Etilen)</option>
                                            <option value="cid:6326">C₂H₂ (Etin / Asetilen)</option>
                                            <option value="cid:241">C₆H₆ (Benzen Halkası)</option>
                                        </optgroup>
                                    </select>
                                </div>
                                <div class="grid grid-cols-3 gap-2">
                                    <button onclick="setRenderStyle('ball')" class="bg-[#161922] py-2 rounded text-[10px] font-bold border border-gray-800 hover:border-indigo-500">Top-Çubuk</button>
                                    <button onclick="setRenderStyle('space')" class="bg-[#161922] py-2 rounded text-[10px] font-bold border border-gray-800 hover:border-indigo-500">Uzay Dolgu</button>
                                    <button onclick="setRenderStyle('line')" class="bg-[#161922] py-2 rounded text-[10px] font-bold border border-gray-800 hover:border-indigo-500">Tel Kafes</button>
                                </div>
                            </div>
                            
                            <div class="md:col-span-2 bg-[#020617] rounded-xl border border-gray-900 relative min-h-[440px] flex flex-col justify-between overflow-hidden">
                                <div id="molecule-viewer" class="w-full h-full absolute inset-0"></div>
                                <div class="absolute bottom-12 left-4 bg-gray-950/80 px-3 py-1 rounded-full text-xs font-bold text-white shadow-md z-10">
                                    <span id="mol3d-label">NaCl (Kristal Örgü)</span>
                                </div>
                                <div id="mol3d-info" class="absolute bottom-3 left-4 right-4 bg-gray-950/70 p-2 rounded text-[11px] text-gray-400 leading-relaxed border border-gray-900/30 z-10">
                                    İyonik kristal kafes yapısı. Birim hücre modellemesi aktif.
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- PANEL 1: AMİNO ASİTLER -->
                    <div class="sub-panel hidden grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4" id="amino-grid"></div>

                    <!-- PANEL 2: LAB EKİPMANLARI -->
                    <div class="sub-panel hidden grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4" id="lab-grid"></div>

                </div>

            </div>
        </main>
    </div>

    <script>
        let viewer = null;
        let currentStyle = 'ball';

        function switchSubTab(idx) {
            $('.tab-btn').removeClass('active bg-indigo-600 text-white').addClass('text-gray-500 hover:text-gray-300');
            $('.tab-btn').eq(idx).addClass('active bg-indigo-600 text-white').removeClass('text-gray-500');
            $('.sub-panel').addClass('hidden').eq(idx).removeClass('hidden');
        }

        // --- HIGH FIDELITY 3DMOL.JS MOLECULAR ENGINE ---
        function handleMoleculeChange(val) {
            if (!viewer) return;
            viewer.clear();
            
            if (val.startsWith("crystal:")) {
                $('#mol3d-label').text("NaCl (Kübik Birim Hücre Örgüsü)");
                $('#mol3d-info').text("⚠️ ÖÖSYM Kritik Notu: NaCl molekül DEĞİLDİR, iyonik örgü yapısındadır. Gösterilen model elektrostatik katyon-anyon birim hücre istifidir.");
                
                // NaCl Kristal Kafes Matris Çizimi
                for(let x=-1; x<=1; x++) {
                    for(let y=-1; y<=1; y++) {
                        for(let z=-1; z<=1; z++) {
                            let isNa = (x + y + z) % 2 === 0;
                            viewer.addSphere({ 
                                center: {x: x*2.5, y: y*2.5, z: z*2.5}, 
                                radius: isNa ? 0.48 : 0.72, 
                                color: isNa ? '#818cf8' : '#22c55e' 
                            });
                        }
                    }
                }
                viewer.render(); viewer.zoomTo();
            } else {
                let cid = val.replace("cid:", "");
                let textName = $('#molSelector option:selected').text();
                $('#mol3d-label').text(textName);
                $('#mol3d-info').text("Kovalent bağ yapısı. Orbitallerin elektron ortaklaşması ile kurulan kararlı molekül geometrisi.");
                
                $3Dmol.download("cid:" + cid, viewer, {}, function() {
                    applyRenderStyle();
                });
            }
        }

        function setRenderStyle(styleName) {
            currentStyle = styleName;
            applyRenderStyle();
        }

        function applyRenderStyle() {
            if (!viewer) return;
            let selectVal = $('#molSelector').val();
            if (selectVal.startsWith("crystal:")) return; // Kristal yapıda stil değişmez

            let styleConfig = {};
            if (currentStyle === 'ball') {
                styleConfig = { stick: { radius: 0.15 }, sphere: { scale: 0.25 } };
            } else if (currentStyle === 'space') {
                styleConfig = { sphere: {} };
            } else if (currentStyle === 'line') {
                styleConfig = { line: {} };
            }

            viewer.setStyle({}, styleConfig);
            viewer.render();
            viewer.zoomTo();
        }

        // --- AMİNO ASİT VE LABORATUVAR DATALARI COMPILATION ---
        const AMINO=[
            {sym:'Gly',name:'Glisin',ka:2.35,kb:9.78,polar:'Apolar',charge:'Yüksüz',formula:'C₂H₅NO₂',desc:'En basit amino asit. R yan zinciri sadece tek bir Hidrojen (H) atomundan ibarettir.'},
            {sym:'Ala',name:'Alanin',formula:'C₃H₇NO₂',polar:'Apolar',charge:'Yüksüz',desc:'R grubu metil (-CH₃) olan hidrofobik amino asit parametresi.'},
            {sym:'Cys',name:'Sistein',formula:'C₃H₇NO₂S',polar:'Polar',charge:'Yüksüz',desc:'Kükürt içerir, sülfhidril (-SH) grubu ile proteinlerde disülfit köprüleri kurar.'}
        ];
        
        const LABS=[
            {name:'Erlenmayer',icon:'⚗️',use:'Çözelti karıştırma, saklama ve titrasyon prosesleri.',safety:'Kırılgan temperli cam yapı. Çıplak ateşle doğrudan ısıtılmamalıdır.'},
            {name:'Büret',icon:'🧪',use:'Titrasyon deneylerinde asit ya da bazın hassas hacimsel damlatılması.',safety:'Musluk sızdırmazlık gresi ve kalibrasyon çizgileri kontrol edilmelidir.'}
        ];

        function initDataLists() {
            const ag = $('#amino-grid');
            AMINO.forEach(aa => {
                ag.append(`
                    <div class="bg-[#0f1117] p-4 rounded-xl border border-gray-900 shadow-lg">
                        <div class="text-2xl font-black text-indigo-400 font-['Space_Grotesk']">${aa.sym}</div>
                        <div class="text-xs font-bold text-gray-200 mt-1">${aa.name} (${aa.formula})</div>
                        <p class="text-[11px] text-gray-500 mt-1 leading-relaxed">${aa.desc}</p>
                        <div class="flex gap-2 mt-2 text-[10px]">
                            <span class="bg-indigo-500/10 text-indigo-400 px-2 py-0.5 rounded border border-indigo-500/20">${aa.polar}</span>
                            <span class="bg-gray-800 text-gray-400 px-2 py-0.5 rounded">${aa.charge}</span>
                        </div>
                    </div>
                `);
            });

            const lg = $('#lab-grid');
            LABS.forEach(l => {
                lg.append(`
                    <div class="bg-[#0f1117] p-4 rounded-xl border border-gray-900 shadow-lg">
                        <div class="text-3xl">${l.icon}</div>
                        <div class="text-xs font-black text-gray-200 mt-1">${l.name}</div>
                        <div class="text-[11px] text-gray-400 mt-1"><span class="text-gray-600 font-bold">Kullanım:</span> ${l.use}</div>
                        <div class="text-[10px] text-red-400 mt-3 bg-red-500/10 p-2 rounded-lg border border-red-500/20">⚠️ ${l.safety}</div>
                    </div>
                `);
            });
        }

        $(document).ready(function() {
            // 3Dmol Görüntüleyici Başlatma
            viewer = $3Dmol.createViewer($('#molecule-viewer'), { backgroundColor: '#020617' });
            
            // Periyodik tablodan gelen yönlendirme var mı?
            const urlParams = new URLSearchParams(window.location.search);
            const passedCid = urlParams.get('cid');
            if (passedCid) {
                if (passedCid == "1") { $('#molSelector').val("cid:783"); handleMoleculeChange("cid:783"); }
                else if (passedCid == "6") { $('#molSelector').val("cid:241"); handleMoleculeChange("cid:241"); }
                else { handleMoleculeChange("crystal:nacl"); }
            } else {
                handleMoleculeChange("crystal:nacl");
            }
            
            initDataLists();
        });
    </script>
</body>
</html>
