                    </div>

                <nav class="space-y-1">

                    <a href="periyodik.html" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 font-semibold text-sm transition"><i class="fas fa-table w-5 text-center"></i> <span>Periyodik Tablo</span></a>
                    <a href="laboratuvar.html" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl bg-indigo-600 text-white font-bold text-sm"><i class="fas fa-flask w-5 text-center"></i> <span>3D Araçlar</span></a>
                </nav>
            </div>
            <div class="p-5 border-t border-gray-800 flex items-center space-x-3 bg-gray-950/40 flex-shrink-0">
                <div class="w-10 h-10 bg-indigo-950 rounded-full flex items-center justify-center font-black text-indigo-400">M</div>

        <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 z-40 hidden"></div>

        <main class="flex-1 flex flex-col overflow-y-auto min-w-0">

                <div class="flex items-center space-x-3">
                    <button onclick="toggleSidebar()" class="p-2 -ml-2 text-gray-400 hover:text-white md:hidden"><i class="fas fa-bars text-xl"></i></button>
                    <h2 class="text-lg md:text-xl font-extrabold text-white">🧬 Roni Gelişmiş Kimya İstasyonu</h2>
                </div>
            </header>

            <div class="p-4 md:p-6 max-w-7xl w-full mx-auto space-y-6 flex-1 flex flex-col">
                
                <div class="flex bg-[#0f111a] p-1 rounded-xl border border-gray-900 shrink-0 shadow-lg">
                    <button onclick="switchSubTab(0)" class="tab-btn active flex-1 text-center py-2.5 text-xs font-black rounded-lg transition-all">🔬 17 Adet 3D Molekül Laboratuvarı</button>
                    <button onclick="switchSubTab(1)" class="tab-btn flex-1 text-center py-2.5 text-xs font-black rounded-lg text-gray-500 transition-all">🧬 Eksiksiz 20 Amino Asit</button>
                    <button onclick="switchSubTab(2)" class="tab-btn flex-1 text-center py-2.5 text-xs font-black rounded-lg text-gray-500 transition-all">🧪 16 MEB Temel Malzemesi</button>
                </div>

                <div id="subTabPanels" class="flex-1 flex flex-col">
                    
                    <div class="sub-panel flex-1 flex flex-col space-y-4">

                                    <label class="text-[10px] font-bold text-gray-500 uppercase block mb-1">Müfredat Örnek Listesi (Tam 17 Adet):</label>

                                        <option value="local:N2">N₂ (Azot Gazı)</option>
                                        <option value="local:HF">HF (Hidrojen Florür)</option>

        </div>

    <script>
        let viewer = null;
        function toggleSidebar() { $('#sidebarPanel').toggleClass('-translate-x-full'); $('#sidebarOverlay').toggleClass('hidden'); }
        function switchSubTab(idx) { $('.tab-btn').removeClass('active bg-indigo-600 text-white').addClass('text-gray-500'); $('.tab-btn').eq(idx).addClass('active bg-indigo-600 text-white'); $('.sub-panel').addClass('hidden').eq(idx).removeClass('hidden'); }

        // Tam Bağımsız 17 Uzay Geometrisi Koordinat Matrisi

            "H2": "2\nH2\nH 0.000 0.000 0.370\nH 0.000 0.000 -0.370",
            "O2": "2\nO2\nO 0.000 0.000 0.605\nO 0.000 0.000 -0.605",
            "N2": "2\nN2\nN 0.000 0.000 0.550\nN 0.000 0.000 -0.550",
            "HF": "2\nHF\nH 0.000 0.000 -0.917\nF 0.000 0.000 0.000",
            "HCN": "3\nHCN\nH 0.000 0.000 -1.066\nC 0.000 0.000 0.000\nN 0.000 0.000 1.153",
            "C2H6": "8\nEthane\nC 0.000 0.000 0.760\nC 0.000 0.000 -0.760\nH 0.000 1.020 1.120\nH 0.883 -0.510 1.120\nH -0.883 -0.510 1.120\nH 0.000 -1.020 -1.120\nH -0.883 0.510 -1.120\nH 0.883 0.510 -1.120",

        };

        // Eksiksiz 20 Amino Asit Havuzu
        const AMINO = [
            {sym:'Gly',name:'Glisin',formula:'C₂H₅NO₂',desc:'En basit amino asit. Yan zinciri sadece tek bir Hidrojen atomudur.'},

            {sym:'Val',name:'Valin',formula:'C₅H₁₁NO₂',desc:'Dallı zincirli esansiyel bir amino asit, kas onarımını destekler.'},

            {sym:'Asn',name:'Asparagin',formula:'C₄H∸N₂O₃',desc:'Karboksamid yan zinciri taşır. Yüksüz polar yapıdadır.'},
            {sym:'Gln',name:'Glutamin',formula:'C₅H₁₀N₂O₃',desc:'Kanda ve kaslarda en bol bulunan serbest polar amino asit.'},
            {sym:'Pro',name:'Prolin',formula:'C₅H₉NO₂',desc:'Halkasal ikincil amin yapısı, protein sarmallarında katlanma noktası oluşturur.'}
        ];

        // 16 Adet Gerçek MEB Vektörel Cam Malzeme Listesi
        const LABS = [
            {name:'Beherglas',use:'Sıvıların karıştırılması, aktarılması ve ısıtılmasında kullanılan geniş temperli cam kaptır.',svg:`<svg width="50" height="60" viewBox="0 0 80 90" fill="none" stroke="#818cf8" stroke-width="3.5"><path d="M15 15 L12 18 L12 80 Q12 85 20 85 L60 85 Q68 85 68 80 L68 15 Z" fill="rgba(129,102,241,0.05)"/><line x1="20" y1="35" x2="35" y2="35" stroke-width="1.5"/><line x1="20" y1="55" x2="45" y2="55" stroke-width="1.5"/></svg>`},
            {name:'Erlenmayer',use:'Konik yapısı sayesinde titrasyon düzeneklerinde sıvı sıçramasını önleyen dar boyunlu cam kaptır.',svg:`<svg width="50" height="60" viewBox="0 0 80 90" fill="none" stroke="#818cf8" stroke-width="3.5"><path d="M33 15 L47 15 L47 30 L72 80 Q75 85 65 85 L15 85 Q5 85 8 80 L33 30 Z" fill="rgba(129,102,241,0.05)"/><line x1="28" y1="60" x2="52" y2="60" stroke-width="1.5"/></svg>`},
            {name:'Balon Joje',use:'Belli derişimlerdeki hassas molar çözeltilerin standart olarak hazırlanmasında kullanılan ölçü çizgili kaptır.',svg:`<svg width="50" height="60" viewBox="0 0 80 90" fill="none" stroke="#818cf8" stroke-width="3.5"><path d="M36 15 L44 15 L44 45 L62 75 Q66 82 58 82 L22 82 Q14 82 18 75 L36 45 Z" fill="rgba(129,102,241,0.05)"/><line x1="36" y1="32" x2="44" y2="32" stroke="#ef4444" stroke-width="2"/></svg>`},
            {name:'Ayırma Hunisi',use:'Zeytinyağı-su gibi birbirine karışmayan sıvı-sıvı heterojen karışımları yoğunluk farkıyla ayıran musluklu hunidir.',svg:`<svg width="50" height="60" viewBox="0 0 80 90" fill="none" stroke="#818cf8" stroke-width="3.5"><path d="M40 12 Q65 25 60 50 L44 72 L44 85 L36 85 L36 72 L20 50 Q15 25 40 12 Z" fill="rgba(129,102,241,0.05)"/><circle cx="40" cy="76" r="3" fill="#ef4444" stroke="none"/></svg>`},

            {name:'Büret',use:'Titrasyon analizinde, erlenmayerdeki numuneye asit/baz damlatılmasını sağlayan altı hassas musluklu cam borudur.',svg:`<svg width="50" height="60" viewBox="0 0 80 90" fill="none" stroke="#818cf8" stroke-width="3.5"><line x1="36" y1="10" x2="36" y2="75" stroke-width="3"/><line x1="44" y1="10" x2="44" y2="75" stroke-width="3"/><path d="M34 75 L46 75 L40 88 Z" fill="#ef4444"/></svg>`},

            {name:'Puar',use:'Pipetlerin üst ucuna takılarak asit, baz gibi tehlikeli sıvıların emniyetle çekilmesini sağlayan plastik pompadır.',svg:`<svg width="50" height="60" viewBox="0 0 80 90" fill="none" stroke="#ef4444" stroke-width="3.5"><circle cx="40" cy="45" r="16" fill="rgba(239,68,68,0.05)"/><line x1="40" y1="29" x2="40" y2="15" stroke-width="2"/></svg>`},
            {name:'Baget',use:'Kimyasal çözeltileri ve karışımları homojen hale getirmek için kullanılan katı cam çubuktur.',svg:`<svg width="50" height="60" viewBox="0 0 80 90" fill="none" stroke="#38bdf8" stroke-width="3.5"><line x1="25" y1="20" x2="55" y2="70" stroke-width="4" stroke-linecap="round"/></svg>`},
            {name:'Deney Tüpü',use:'Küçük ölçekli nitel reaksiyon gözlemleri ve test karışımları için kullanılan standart cam tüptür.',svg:`<svg width="50" height="60" viewBox="0 0 80 90" fill="none" stroke="#818cf8" stroke-width="3.5"><path d="M32 15 L48 15 L48 65 Q48 78 40 78 Q32 78 32 65 Z" fill="rgba(129,102,241,0.05)"/></svg>`}
        ];

        function openModal(idx) { const mat = LABS[idx]; $('#modalVisual').html(mat.svg); $('#modalVisual svg').attr('width', '110').attr('height', '130'); $('#modalName').text(mat.name); $('#modalUse').text(mat.use); $('#equipmentModal').removeClass('hidden'); }
        function closeModal() { $('#equipmentModal').addClass('hidden'); }

        $(document).ready(function() {
            viewer = $3Dmol.createViewer($('#molecule-viewer'), { backgroundColor: '#02040a' });
            handleMoleculeChange("local:CH4");

            // 20 Amino Asidin Tamamını Döngüyle Basıyoruz (Sıfır Kayıp)
            AMINO.forEach(aa => { 
                $('#amino-grid').append(`
                    <div class="bg-[#0f111a] p-4 rounded-xl border border-gray-900 shadow-md">
                        <div class="text-2xl font-black text-indigo-400 font-['Space_Grotesk'] leading-none">${aa.sym}</div>
                        <div class="text-xs font-bold text-gray-200 mt-2">${aa.name} <span class="text-[10px] text-gray-500 font-mono">(${aa.formula})</span></div>
                        <p class="text-[11px] text-gray-400 mt-1 leading-relaxed">${aa.desc}</p>
                    </div>
                `); 
            });

            // 16 Vektörel Malzemenin Tamamını Döngüyle Basıyoruz
            LABS.forEach((l, idx) => { 
                $('#lab-grid').append(`
                    <div onclick="openModal(${idx})" class="bg-[#0f111a] p-4 rounded-xl border border-gray-900 hover:border-indigo-500 transition-all cursor-pointer flex flex-col items-center justify-between shadow-md text-center group">
                        <div class="p-3 bg-gray-950 rounded-xl border border-gray-900/60 group-hover:scale-105 transition-transform">${l.svg}</div>
                        <div class="text-xs font-black text-gray-200 mt-2 font-['Space_Grotesk']">${l.name}</div>
                    </div>
                `); 
            });

            $('#equipmentModal').click(function(e) { if(e.target === this) closeModal(); });
        });
    </script>
</body>
</html>
