<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gelişmiş İnteraktif Periyodik Tablo</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --border-color: #334155;
            
            /* Element Blok Renkleri */
            --s-block: #ef4444;
            --p-block: #3b82f6;
            --d-block: #eab308;
            --f-block: #22c55e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; }

        .container { display: flex; flex-direction: column; gap: 20px; max-width: 1600px; margin: 0 auto; }
        h1 { text-align: center; color: var(--accent-color); margin-bottom: 10px; font-weight: 600; }

        /* Main Layout */
        .app-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        @media (max-width: 1200px) { .app-layout { grid-template-columns: 1fr; } }

        /* Periodic Table Grid */
        .table-container { overflow-x: auto; background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); }
        .periodic-table { display: grid; grid-template-columns: repeat(18, minmax(50px, 1fr)); gap: 4px; min-width: 900px; }

        /* Element Styles */
        .element {
            background: #1e293b; border: 1px solid var(--border-color); border-radius: 6px;
            padding: 6px; text-align: center; cursor: pointer; transition: all 0.2s ease;
            position: relative; aspect-ratio: 1; display: flex; flex-direction: column; justify-content: space-between;
        }
        .element:hover { transform: scale(1.1); z-index: 10; box-shadow: 0 0 12px var(--accent-color); }
        .element.active { border: 2px solid var(--accent-color); box-shadow: 0 0 10px rgba(56, 189, 248, 0.5); }
        
        .element .num { font-size: 0.75rem; text-align: left; opacity: 0.7; }
        .element .sym { font-size: 1.2rem; font-weight: bold; }
        .element .name { font-size: 0.65rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity: 0.8; }

        /* Blok Sınıfları */
        .s-blk { border-left: 4px solid var(--s-block); }
        .p-blk { border-left: 4px solid var(--p-block); }
        .d-blk { border-left: 4px solid var(--d-block); }
        .f-blk { border-left: 4px solid var(--f-block); }

        /* Detail Panel & Tabs */
        .detail-panel { background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border-color); padding: 20px; display: flex; flex-direction: column; }
        .element-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; border-bottom: 2px solid var(--border-color); padding-bottom: 15px; }
        .big-sym { font-size: 3rem; font-weight: bold; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; background: #0f172a; border-radius: 10px; border: 2px solid var(--accent-color); }
        .header-text h2 { font-size: 1.8rem; }
        
        /* Tab Menu */
        .tabs { display: flex; border-bottom: 1px solid var(--border-color); gap: 5px; margin-bottom: 15px; overflow-x: auto; }
        .tab-btn { background: none; border: none; color: #94a3b8; padding: 10px 15px; cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: all 0.2s; white-space: nowrap; }
        .tab-btn:hover { color: var(--text-color); }
        .tab-btn.active { color: var(--accent-color); border-bottom: 2px solid var(--accent-color); font-weight: bold; }

        /* Tab Content */
        .tab-content { display: none; flex-direction: column; gap: 12px; min-height: 250px; }
        .tab-content.active { display: flex; }
        
        .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #334155; font-size: 0.95rem; }
        .info-row span:first-child { color: #94a3b8; font-weight: 500; }
        .info-row span:last-child { color: #f8fafc; font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <h1>İnteraktif Kimya Laboratuvarı: Periyodik Tablo</h1>
    
    <div class="app-layout">
        <div class="table-container">
            <div class="periodic-table" id="periodicTableContainer">
                </div>
        </div>

        <div class="detail-panel" id="detailPanel">
            <div class="element-header">
                <div class="big-sym" id="detSym">H</div>
                <div class="header-text">
                    <h2 id="detName">Hidrojen</h2>
                    <p id="detGroupBlock">1. Periyot / 1A Grubu - s Bloğu</p>
                </div>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab(event, 'genel')">Genel Bilgiler</button>
                <button class="tab-btn" onclick="switchTab(event, 'kimyasal')">Kimyasal</button>
                <button class="tab-btn" onclick="switchTab(event, 'fiziksel')">Fiziksel</button>
                <button class="tab-btn" onclick="switchTab(event, 'atomik')">Atomik Yapı</button>
            </div>

            <div id="genel" class="tab-content active"></div>
            <div id="kimyasal" class="tab-content"></div>
            <div id="fiziksel" class="tab-content"></div>
            <div id="atomik" class="tab-content"></div>
        </div>
    </div>
</div>

<script>
    // Genişletilebilir Element Veri Havuzu (Örnek olarak ilk 20 element tam detaylı eklenmiştir)
    const elementsData = {
        1: { num: 1, sym: "H", name: "Hidrojen", row: 1, col: 1, blk: "s-blk", group: "1A", period: 1, mass: "1.008", discoverer: "Henry Cavendish (1766)", electronegativity: "2.20", states: "+1, -1", bond: "Kovalent", melting: "-259.1 °C", boiling: "-252.9 °C", density: "0.089 g/L", phase: "Gaz", config: "1s¹", bohr: "1", radius: "53 pm" },
        2: { num: 2, sym: "He", name: "Helyum", row: 1, col: 18, blk: "p-blk", group: "8A", period: 1, mass: "4.0026", discoverer: "Pierre Janssen (1868)", electronegativity: "-", states: "0", bond: "Asil Gaz", melting: "-272.2 °C", boiling: "-268.9 °C", density: "0.178 g/L", phase: "Gaz", config: "1s²", bohr: "2", radius: "31 pm" },

        4: { num: 4, sym: "Be", name: "Berilyum", row: 2, col: 2, blk: "s-blk", group: "2A", period: 2, mass: "9.0122", discoverer: "Louis Nicolas Vauquelin", electronegativity: "1.57", states: "+2", bond: "Metalik", melting: "1287 °C", boiling: "2469 °C", density: "1.85 g/cm³", phase: "Katı", config: "[He] 2s²", bohr: "2, 2", radius: "112 pm" },
        5: { num: 5, sym: "B", name: "Bor", row: 2, col: 13, blk: "p-blk", group: "3A", period: 2, mass: "10.81", discoverer: "Joseph Louis Gay-Lussac", electronegativity: "2.04", states: "+3", bond: "Kovalent Ağ", melting: "2076 °C", boiling: "3927 °C", density: "2.08 g/cm³", phase: "Katı", config: "[He] 2s² 2p¹", bohr: "2, 3", radius: "87 pm" },
        6: { num: 6, sym: "C", name: "Karbon", row: 2, col: 14, blk: "p-blk", group: "4A", period: 2, mass: "12.011", discoverer: "Antik Çağ", electronegativity: "2.55", states: "+4, +2, -4", bond: "Kovalent", melting: "3550 °C", boiling: "4827 °C", density: "2.26 g/cm³", phase: "Katı", config: "[He] 2s² 2p²", bohr: "2, 4", radius: "67 pm" },
        7: { num: 7, sym: "N", name: "Azot", row: 2, col: 15, blk: "p-blk", group: "5A", period: 2, mass: "14.007", discoverer: "Daniel Rutherford", electronegativity: "3.04", states: "+5, +3, -3", bond: "Kovalent", melting: "-210.1 °C", boiling: "-195.79 °C", density: "1.25 g/L", phase: "Gaz", config: "[He] 2s² 2p³", bohr: "2, 5", radius: "56 pm" },
        8: { num: 8, sym: "O", name: "Oksijen", row: 2, col: 16, blk: "p-blk", group: "6A", period: 2, mass: "15.999", discoverer: "Carl Wilhelm Scheele", electronegativity: "3.44", states: "-2", bond: "Kovalent", melting: "-218.79 °C", boiling: "-182.95 °C", density: "1.429 g/L", phase: "Gaz", config: "[He] 2s² 2p⁴", bohr: "2, 6", radius: "48 pm" },

        12: { num: 12, sym: "Mg", name: "Magnezyum", row: 3, col: 2, blk: "s-blk", group: "2A", period: 3, mass: "24.305", discoverer: "Joseph Black", electronegativity: "1.31", states: "+2", bond: "Metalik", melting: "650 °C", boiling: "1090 °C", density: "1.738 g/cm³", phase: "Katı", config: "[Ne] 3s²", bohr: "2, 8, 2", radius: "145 pm" },
        13: { num: 13, sym: "Al", name: "Alüminyum", row: 3, col: 13, blk: "p-blk", group: "3A", period: 3, mass: "26.982", discoverer: "Hans Christian Ørsted", electronegativity: "1.61", states: "+3", bond: "Metalik", melting: "660.32 °C", boiling: "2519 °C", density: "2.70 g/cm³", phase: "Katı", config: "[Ne] 3s² 3p¹", bohr: "2, 8, 3", radius: "118 pm" },

        17: { num: 17, sym: "Cl", name: "Klor", row: 3, col: 17, blk: "p-blk", group: "7A", period: 3, mass: "35.45", discoverer: "Carl Wilhelm Scheele", electronegativity: "3.16", states: "+7, +5, +3, +1, -1", bond: "Kovalent", melting: "-101.5 °C", boiling: "-34.04 °C", density: "3.214 g/L", phase: "Gaz", config: "[Ne] 3s² 3p⁵", bohr: "2, 8, 7", radius: "79 pm" },
        18: { num: 18, sym: "Ar", name: "Argon", row: 3, col: 18, blk: "p-blk", group: "8A", period: 3, mass: "39.948", discoverer: "Lord Rayleigh, Ramsay", electronegativity: "-", states: "0", bond: "Asil Gaz", melting: "-189.35 °C", boiling: "-185.85 °C", density: "1.784 g/L", phase: "Gaz", config: "[Ne] 3s² 3p⁶", bohr: "2, 8, 8", radius: "71 pm" },
        19: { num: 19, sym: "K", name: "Potasyum", row: 4, col: 1, blk: "s-blk", group: "1A", period: 4, mass: "39.098", discoverer: "Humphry Davy", electronegativity: "0.82", states: "+1", bond: "Metalik", melting: "63.5 °C", boiling: "759 °C", density: "0.89 g/cm³", phase: "Katı", config: "[Ar] 4s¹", bohr: "2, 8, 8, 1", radius: "243 pm" },
        20: { num: 20, sym: "Ca", name: "Kalsiyum", row: 4, col: 2, blk: "s-blk", group: "2A", period: 4, mass: "40.078", discoverer: "Humphry Davy", electronegativity: "1.00", states: "+2", bond: "Metalik", melting: "842 °C", boiling: "1484 °C", density: "1.55 g/cm³", phase: "Katı", config: "[Ar] 4s²", bohr: "2, 8, 8, 2", radius: "194 pm" }
    };

    let selectedElementId = 1;

    // Tabloyu Oluşturma Fonksiyonu
    function createPeriodicTable() {
        const grid = document.getElementById('periodicTableContainer');
        grid.innerHTML = '';

        // 18 sütun ve 4 satırlık alanı simüle ediyoruz (İlk 20 element için ideal görünüm)
        for (let r = 1; r <= 4; r++) {
            for (let c = 1; c <= 18; c++) {
                // Bu koordinatta element var mı?
                const element = Object.values(elementsData).find(e => e.row === r && e.col === c);

                if (element) {
                    const elDiv = document.createElement('div');
                    elDiv.className = `element ${element.blk}`;
                    elDiv.id = `el-${element.num}`;
                    elDiv.innerHTML = `
                        <div class="num">${element.num}</div>
                        <div class="sym">${element.sym}</div>
                        <div class="name">${element.name}</div>
                    `;
                    elDiv.onclick = () => updateDetails(element.num);
                    grid.appendChild(elDiv);
                } else {
                    // Boşlukları doldurmak için görünmez div
                    const emptyDiv = document.createElement('div');
                    grid.appendChild(emptyDiv);
                }
            }
        }
    }

    // Seçilen Element Bilgilerini ve Sekmeleri Güncelleme
    function updateDetails(id) {
        selectedElementId = id;
        
        // Aktif element class değişimi
        document.querySelectorAll('.element').forEach(el => el.classList.remove('active'));
        const activeEl = document.getElementById(`el-${id}`);
        if(activeEl) activeEl.classList.add('active');

        const el = elementsData[id];
        
        // Üst Başlık Bilgileri
        document.getElementById('detSym').innerText = el.sym;
        document.getElementById('detName').innerText = el.name;
        document.getElementById('detGroupBlock').innerText = `${el.period}. Periyot / ${el.group} Grubu - ${el.blk.replace('-blk', '').toUpperCase()} Bloğu`;

        // Sekme İçeriklerini Doldurma
        
        // 1. Genel Bilgiler
        document.getElementById('genel').innerHTML = `
            <div class="info-row"><span>Atom Numarası</span><span>${el.num}</span></div>
            <div class="info-row"><span>Atom Kütlesi</span><span>${el.mass} g/mol</span></div>
            <div class="info-row"><span>Grup / Periyot</span><span>${el.group} / ${el.period}</span></div>
            <div class="info-row"><span>Keşfeden</span><span>${el.discoverer}</span></div>
        `;

        // 2. Kimyasal Özellikler
        document.getElementById('kimyasal').innerHTML = `
            <div class="info-row"><span>Elektronegatiflik</span><span>${el.electronegativity}</span></div>
            <div class="info-row"><span>Yükseltgenme Basamakları</span><span>${el.states}</span></div>
            <div class="info-row"><span>Karakteristik Bağ Türü</span><span>${el.bond}</span></div>
        `;

        // 3. Fiziksel Özellikler
        document.getElementById('fiziksel').innerHTML = `
            <div class="info-row"><span>Oda Koşullarındaki Fazı</span><span>${el.phase}</span></div>
            <div class="info-row"><span>Erime Noktası</span><span>${el.melting}</span></div>
            <div class="info-row"><span>Kaynama Noktası</span><span>${el.boiling}</span></div>
            <div class="info-row"><span>Yoğunluk</span><span>${el.density}</span></div>
        `;

        // 4. Atomik Yapı
        document.getElementById('atomik').innerHTML = `
            <div class="info-row"><span>Elektron Dizilimi</span><span>${el.config}</span></div>
            <div class="info-row"><span>Katman Elektron (Bohr)</span><span>${el.bohr}</span></div>
            <div class="info-row"><span>Atom Yarıçapı</span><span>${el.radius}</span></div>
        `;
    }

    // Sekme Değiştirme Mantığı (Tab Switcher)
    function switchTab(evt, tabId) {
        // Tüm içerikleri gizle
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        // Tüm butonların aktifliğini kaldır
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));

        // Hedef sekmeyi ve butonu aktif et
        document.getElementById(tabId).classList.add('active');
        evt.currentTarget.classList.add('active');
    }

    // Uygulamayı Başlat
    createPeriodicTable();
    updateDetails(1); // Varsayılan olarak Hidrojen ile başla
</script>

</body>
</html>
