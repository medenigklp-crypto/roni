<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roni – YKS Kimya Platformu</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RONI">

  <link rel="apple-touch-icon" href="logo.png?v=1.1">
  <link rel="icon" type="image/png" sizes="192x192" href="logo.png?v=1.1">
  <link rel="manifest" href="manifest.json">

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <style>
    :root {
      --bg: #08090f; 
      --sf: #0f1117; 
      --sf2: #161922;
      --br: #1f2432;
    }
    body { 
      background: var(--bg); 
      color: #ffffff; 
      font-family: 'Inter', sans-serif;
    }
    body::before {
      content: ''; 
      position: fixed; 
      inset: 0;
      background-image: radial-gradient(circle at 50% 50%, transparent 0%, var(--bg) 100%);
      background-size: 28px 28px; 
      pointer-events: none;
      z-index: -1;
    }
  </style>
</head>
<body class="overflow-x-hidden">

  <div class="flex h-screen overflow-hidden">
    
    <aside id="sidebarPanel" class="fixed inset-y-0 left-0 z-50 w-64 bg-[#0f1117] border-r border-[#1f2432] transition-transform duration-300 md:translate-x-0">
      <div class="p-5 overflow-y-auto h-full flex flex-col">
        <div class="flex items-center space-x-3 mb-8">
          </div>
        
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-y-auto md:pl-64">
      
      <div class="flex justify-between items-center p-4">
        <span id="pomtm" class="text-sm">25:00</span>
        <button onclick="pomToggle()" id="pomstbtn" class="text-xs bg-red-600 px-3 py-1 rounded">Başlat</button>
      </div>

    </main>
  </div>

  <script>
    function toggleSidebar() {
      $('#sidebarPanel').toggleClass('-translate-x-full');
    }

    // YKS Geri Sayım Sayacı (2027 Hedefi)
    function tickCD() {
      const diff = new Date('2027-06-19T10:00:00') - new Date();
      if (diff <= 0) return;
      const g = Math.floor(diff / 86400000);
      $('#cdg').text(String(g).padStart(2, '0'));
    }
    setInterval(tickCD, 1000);

    // Pomodoro Zamanlayıcı Ayarları
    let pom = { run: false, rem: 25 * 60 };
    let pomInterval;

    function pomToggle() {
      if (pom.run) {
        clearInterval(pomInterval);
        pom.run = false;
        $('#pomstbtn').text('Başlat');
      } else {
        pom.run = true;
        $('#pomstbtn').text('Durdur');
        pomInterval = setInterval(pomTick, 1000);
      }
    }

    function pomTick() {
      pom.rem--;
      if (pom.rem <= 0) {
        clearInterval(pomInterval);
      }
      const m = Math.floor(pom.rem / 60);
      const s = pom.rem % 60;
      $('#pomtm').text(String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0'));
    }

    $(document).ready(function () {
      tickCD();
    });
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js');
      });
    }
  </script>
</body>
</html>
