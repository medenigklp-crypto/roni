<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roni — Kimya Simülasyonları</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RONI">
    <link rel="apple-touch-icon" href="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/512x512/2600.png">
    <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/512x512/2600.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        :root { --bg: #08090f; --sf: #0f1117; --sf2: #161922; --ac: #6366f1; }
        body { background: var(--bg); color: #f1f5f9; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>
    <div class="max-w-7xl mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-1 bg-[#0f1117] p-4 rounded-xl border border-gray-900 space-y-2">
            <button onclick="loadSim(13)" class="w-full text-left p-3 rounded-xl border border-gray-800 bg-gray-900 text-xs font-bold text-indigo-400">💧 Deney: Asit-Baz Titrasyon Düzeneği</button>
            <button onclick="loadSim(1)" class="w-full text-left p-3 rounded-xl border border-gray-800 bg-gray-900 text-xs font-bold text-gray-400 mt-2">🧪 Deney: Turnusol İndikatör Testi</button>
        </div>
        <div class="lg:col-span-2 bg-[#0f1117] p-6 rounded-xl border border-gray-900 min-h-[500px] flex flex-col justify-between">
            <h3 id="sTitle" class="text-base font-black border-b border-gray-800 pb-2">Aktif Deney Alanı</h3>
            <div id="simDisplay" class="flex-1 flex items-center justify-center py-6"></div>
        </div>
    </div>
    <script>
        function loadSim(id) {
            const display = $('#simDisplay'); display.empty();
            if(id === 13) {
                $('#sTitle').text("Mekanik Büret ve Titrasyon Düzeneği");
                display.html(`
                    <div class="flex flex-col items-center space-y-4 w-full max-w-xs">
                        <div class="w-6 h-36 bg-slate-800 border-2 border-slate-600 relative rounded-b shadow-inner">
                            <div id="bFluid" class="w-full bg-blue-400/40 absolute bottom-0" style="height:100%"></div>
                        </div>
                        <div class="w-8 h-2 bg-indigo-600 rounded"></div>
                        <div id="erlenFlask" class="w-16 h-16 bg-slate-800 border-2 border-slate-600 rounded-b-2xl relative overflow-hidden flex flex-col justify-end transition-all duration-300">
                            <div id="eFluid" class="w-full bg-gray-300/10" style="height:25%"></div>
                        </div>
                        <input type="range" min="0" max="50" value="0" step="0.5" oninput="runTit(this.value)" class="w-full accent-indigo-500 cursor-pointer">
                        <div class="text-sm font-mono bg-gray-950 px-4 py-2 rounded-xl border border-gray-900">Dijital pH: <span id="phVal" class="font-bold text-red-500">1.00</span></div>
                    </div>
                `);
            } else {
                $('#sTitle').text("Turnusol İndikatör Renk Analiz Tüpü");
                display.html(`
                    <div class="text-center space-y-6 w-full max-w-sm">
                        <div class="flex gap-2 justify-center">
                            <button onclick="checkPH(2.0, 'Limon', '#ef4444')" class="bg-red-500/10 p-2.5 rounded-xl border border-red-500/20 text-xs font-bold text-red-400">Limon</button>
                            <button onclick="checkPH(7.0, 'Saf Su', '#94a3b8')" class="bg-slate-500/10 p-2.5 rounded-xl border border-slate-500/20 text-xs font-bold text-gray-400">Saf Su</button>
                            <button onclick="checkPH(13.5, 'Amonyak', '#3b82f6')" class="bg-blue-500/10 p-2.5 rounded-xl border border-blue-500/20 text-xs font-bold text-blue-400">Amonyak</button>
                        </div>
                        <div class="w-8 h-32 bg-slate-800 border-2 border-slate-600 rounded-b-xl mx-auto relative flex flex-col justify-end overflow-hidden shadow-2xl">
                            <div id="tubeFluid" class="w-full h-12 bg-slate-700/40 transition-all duration-500"></div>
                        </div>
                        <div id="id-ph" class="text-sm font-bold text-gray-400">Numune seçerek tüpe damlatın.</div>
                    </div>
                `);
            }
        }
        function runTit(v) {
            let ph = 1.0 + (v * 0.24); if(v >= 25) ph = 7.0; if(v > 26) ph = 12.5;
            $('#phVal').text(ph.toFixed(2)); $('#bFluid').css('height', (100 - (v*2)) + '%'); $('#eLevel, #eFluid').css('height', (25 + (v * 0.8)) + '%');
            if(ph >= 7) { $('#phVal').attr('class','text-fuchsia-400 font-bold'); $('#eLevel, #eFluid').css('background', 'rgba(232,121,249,0.5)'); }
            else { $('#phVal').attr('class','text-red-500 font-bold'); $('#eLevel, #eFluid').css('background', 'rgba(209,213,219,0.1)'); }
        }
        function checkPH(p, name, color) { $('#id-ph').text(`${name} Çözeltisi Okunuyor — pH: ${p.toFixed(2)}`).css('color', color); $('#tubeFluid').css('background', color + '55'); }
        $(document).ready(function() { loadSim(13); });
    </script>
</body>
</html>
