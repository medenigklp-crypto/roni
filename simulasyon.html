<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roni — Kimya Simülasyonları</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RONI">
    <link rel="apple-touch-icon" href="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/512x512/2600.png">
    <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/512x512/2600.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        :root { --bg: #08090f; --sf: #0f1117; --sf2: #161922; --br: #1e2535; --ac: #6366f1; --ac2: #818cf8; }
        body { background: var(--bg); color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .sim-card.active { border-color: var(--ac); background: rgba(99,102,241,0.05); }
    </style>
</head>
<body class="overflow-x-hidden">

    <div class="flex h-screen overflow-hidden relative">
        <aside class="w-64 bg-gray-950 border-r border-gray-900 hidden md:flex flex-col justify-between">
            <div class="p-5">
                <div class="flex items-center space-x-3 mb-8">
                    <div class="bg-gradient-to-br from-amber-400 to-red-500 w-10 h-10 rounded-xl flex items-center justify-center text-xl shadow-lg relative">
                        <i class="fas fa-sun text-slate-950"></i>
                    </div>
                    <span class="text-xl font-black text-white">RONI</span>
                </div>
                <nav class="space-y-1">
                    <a href="index.html" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400">Ana Sayfa</a>
                    <a href="periyodik.html" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400">Periyodik Tablo</a>
                    <a href="laboratuvar.html" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400">3D Araçlar</a>
                    <a href="simulasyon.html" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl bg-indigo-600 text-white font-bold">Simülasyonlar</a>
                </nav>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-y-auto">
            <div class="p-4 md:p-6 max-w-7xl w-full mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
                
                <div class="lg:col-span-1 bg-[#0f1117] p-4 rounded-xl border border-gray-900 space-y-2">
                    <button onclick="loadSim(1)" class="w-full text-left p-3 rounded-xl border border-gray-800 bg-gray-900 text-xs font-bold">🧪 Asit-Baz Tanılama Testi</button>
                    <button onclick="loadSim(13)" class="w-full text-left p-3 rounded-xl border border-gray-800 bg-gray-900 text-xs font-bold mt-2">💧 Hassas Logaritmik Titrasyon</button>
                </div>

                <div class="lg:col-span-2 bg-[#0f1117] p-6 rounded-xl border border-gray-900 min-h-[500px] flex flex-col justify-between">
                    <h3 id="sTitle" class="text-lg font-black border-b border-gray-800 pb-2">Deney Alanı</h3>
                    
                    <div id="simDisplay" class="flex-1 flex items-center justify-center py-8">
                        </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function loadSim(id) {
            const display = $('#simDisplay'); display.empty();
            if(id === 13) {
                $('#sTitle').text("Asit-Baz Titrasyon Düzeneği");
                display.html(`
                    <div class="flex flex-col items-center space-y-4 w-full max-w-sm">
                        <div class="w-6 h-36 bg-slate-800 border-2 border-slate-600 relative rounded-b">
                            <div id="bFluid" class="w-full bg-blue-500/40 absolute bottom-0" style="height:100%"></div>
                        </div>
                        <div class="w-8 h-2 bg-indigo-600 rounded"></div>
                        <div class="w-20 h-20 bg-slate-800 border-2 border-slate-600 rounded-b-2xl relative overflow-hidden flex flex-col justify-end">
                            <div id="eFluid" class="w-full bg-red-500/20 transition-all duration-300" style="height:30%"></div>
                        </div>
                        <input type="range" min="0" max="50" value="0" oninput="runTit(this.value)" class="w-full accent-indigo-500">
                        <div class="text-sm font-mono">pH: <span id="phVal" class="font-bold text-red-400">1.00</span></div>
                    </div>
                `);
            } else {
                $('#sTitle').text("Asit-Baz Tanılama Testi");
                display.html(`
                    <div class="text-center space-y-4">
                        <div class="flex gap-4 justify-center">
                            <button onclick="checkPH(2.5, 'Limon')" class="bg-red-500/20 p-3 rounded-xl border border-red-500/40 text-xs font-bold">Limon Suyu</button>
                            <button onclick="checkPH(7.0, 'Saf Su')" class="bg-emerald-500/20 p-3 rounded-xl border border-emerald-500/40 text-xs font-bold">Saf Su</button>
                            <button onclick="checkPH(11.5, 'Amonyak')" class="bg-purple-500/20 p-3 rounded-xl border border-purple-500/40 text-xs font-bold">Çamaşır Suyu</button>
                        </div>
                        <div class="text-2xl font-black id-ph">pH: 7.00</div>
                    </div>
                `);
            }
        }
        function runTit(v) {
            let ph = 1 + (v * 0.24); if(v >= 25) ph = 7; if(v > 26) ph = 12.5;
            $('#phVal').text(ph.toFixed(2)); $('#bFluid').css('height', (100 - (v*2)) + '%');
            $('#eFluid').css('height', (30 + (v*1)) + '%');
            if(ph >= 7) $('#eFluid').attr('class', 'w-full bg-fuchsia-500/40');
        }
        function checkPH(p, name) { $('.id-ph').text(`${name} pH Değeri: ${p.toFixed(2)}`); }
        $(document).ready(function() { loadSim(13); });
    </script>
</body>
</html>
