        // Tabloyu DOM Üzerine İnşa Eden Döngü
        function buildTable() {
            const grid = $('#periodic-table-grid');
            grid.empty();
            
            elementsData.forEach(el => {
                const box = $(`
                    <div id="el-${el.sym}" 
                         data-cat="${el.cat}" 
                         onclick="showDetail('${el.name}', '${el.z}', '${el.mass}')"
                         class="element-box bg-[#161922]/50 border border-gray-800/60 p-1.5 rounded-xl flex flex-col justify-between items-start cursor-pointer transition-all duration-300 hover:scale-105 select-none aspect-square"
                         style="grid-row: ${el.r}; grid-column: ${el.c};">
                        <span class="text-[9px] font-bold text-gray-500 leading-none">${el.z}</span>
                        <strong class="text-base font-black text-white self-center my-0.5 tracking-tight">${el.sym}</strong>
                        <span class="text-[8px] font-medium text-gray-400 truncate w-full text-center">${el.name}</span>
                    </div>
                `);
                grid.append(box);
            });
        }

        // Alt Panel Detay Güncelleyici
        function showDetail(name, z, mass) {
            $('#detail-name').text(name);
            $('#detail-z').text(z);
            $('#detail-mass').text(mass);
        }

        // Kimyasal Olarak Kusursuz Çalışan Filtreleme Mekanizması
        function filtrele(kategori) {
            // Önce tüm sınıfları ve opaklıkları sıfırla
            $('.element-box').removeClass('opacity-20 glow-alkali glow-toprak-alkali glow-gecis glow-yari-metal glow-toprak-metali');

            if (kategori === 'hepsi') return;

            // Diğer tüm elementlerin opaklığını düşür
            $('.element-box').addClass('opacity-20');

            switch(kategori) {
                case 'alkali':
                    // 1A Grubu (H hariç)
                    $('[data-cat="alkali"]').removeClass('opacity-20').addClass('glow-alkali');
                    break;
                case 'toprak-alkali':
                    // 2A Grubu tam liste
                    $('[data-cat="toprak-alkali"]').removeClass('opacity-20').addClass('glow-toprak-alkali');
                    break;
                case 'gecis-metali':
                    // Sadece d-bloğu elementleri parlar
                    $('[data-cat="gecis-metali"]').removeClass('opacity-20').addClass('glow-gecis');
                    break;
                case 'yari-metal':
                    // B, Si, Ge, As, Sb, Te tam kadro parlar
                    $('[data-cat="yari-metal"]').removeClass('opacity-20').addClass('glow-yari-metal');
                    break;
                case 'toprak-metali':
                    // 3A Grubunun gerçek metalleri (Al, Ga, In, Tl, Nh) parlar
                    $('[data-cat="toprak-metali"]').removeClass('opacity-20').addClass('glow-toprak-metali');
                    break;
            }
        }

        // Sayfa Yüklendiğinde Tabloyu Tetikle
        $(document).ready(function() {
            buildTable();
        });
    </script>

    <!-- Service Worker Kayıt Altyapısı -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js');
            });
        }
    </script>

</body>
</html>
