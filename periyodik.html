    <style>
        :root {
            --bg: #08090f; --sf: #0f1117; --sf2: #161922; --sf3: #1c2030;
            --br: #1e2535; --br2: #252d40; --ac: #6366f1; --ac2: #818cf8;
            --gr: #22c55e; --rd: #ef4444; --yw: #f59e0b; --tx: #f1f5f9; --tx2: #94a3b8;
        }
        body { background: var(--bg); color: var(--tx); font-family: 'Inter', sans-serif; }
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image: radial-gradient(circle at 1px 1px, rgba(99,102,241,.06) 1px, transparent 0);
            background-size: 28px 28px; pointer-events: none; z-index: 0;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: var(--br2); border-radius: 3px; }
        .tab-btn.active { background: var(--ac); color: white; }
        .style-btn.active { border-color: var(--ac); color: var(--ac2); background: rgba(99,102,241,0.12); }
    </style>
</head>
<body class="overflow-x-hidden custom-scrollbar">

    <div class="flex h-screen overflow-hidden relative z-10">
        
        <aside id="sidebarPanel" class="fixed inset-y-0 left-0 z-[100] w-64 bg-gray-950 flex flex-col justify-between border-r border-gray-900 transform -translate-x-full transition-transform duration-300 ease-in-out md:translate-x-0 md:static md:h-screen flex-shrink-0">
            <div class="p-5 overflow-y-auto flex-1 custom-scrollbar">
                <div class="flex items-center justify-between mb-8">
                    <div class="flex items-center space-x-3">
                        <div class="bg-gradient-to-br from-amber-400 via-orange-500 to-red-500 text-slate-950 w-10 h-10 rounded-xl flex items-center justify-center text-xl shadow-lg relative">
                            <i class="fas fa-sun animate-[spin_20s_linear_infinite]"></i>
                        </div>
                        <span class="text-xl font-black text-white">RONI</span>
                    </div>
                    <button onclick="toggleSidebar()" class="text-gray-400 hover:text-white p-2"><i class="fas fa-times text-xl"></i></button>
                </div>
                
                <nav class="space-y-1">
                    <a href="index.html" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-900 hover:text-white font-semibold text-sm transition">
                        <i class="fas fa-chart-pie w-5 text-center"></i> <span>Ana Sayfa</span>
                    </a>
                    <a href="periyodik.html" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-900 hover:text-white font-semibold text-sm transition">
                        <i class="fas fa-table w-5 text-center"></i> <span>Periyodik Tablo</span>
                    </a>
                    <a href="laboratuvar.html" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl bg-indigo-600 text-white font-bold text-sm">
                        <i class="fas fa-flask w-5 text-center"></i> <span>3D Araçlar</span>
                    </a>
                    <a href="simulasyon.html" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-900 hover:text-white font-semibold text-sm transition">
                        <i class="fas fa-laptop-code w-5 text-center"></i> <span>Simülasyonlar</span>
                    </a>
                    <a href="atlas.html" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-900 hover:text-white font-semibold text-sm transition">
                        <i class="fas fa-graduation-cap w-5 text-center"></i> <span>YÖK Atlas</span>
                    </a>
                </nav>
            </div>
            <div class="p-5 border-t border-gray-800 flex items-center space-x-3 bg-gray-950/40 flex-shrink-0">
                <div class="w-10 h-10 bg-indigo-950 rounded-full flex items-center justify-center font-black text-indigo-400">M</div>
                <div><h4 class="text-sm font-bold text-gray-200">Medeni Gökalp</h4><span class="text-xs text-gray-500">Kimya Öğretmeni</span></div>
            </div>
        </aside>

        <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 z-40 hidden"></div>

        <main class="flex-1 flex flex-col overflow-y-auto min-w-0">
            <header class="bg-[#08090f]/90 backdrop-blur border-b border-gray-900 px-6 py-4 flex justify-between items-center sticky top-0 z-30">
                <div class="flex items-center space-x-3">
                    <button onclick="toggleSidebar()" class="p-2 -ml-2 text-gray-400 hover:text-white md:hidden"><i class="fas fa-bars text-xl"></i></button>
                    <h2 class="text-lg md:text-xl font-extrabold text-white tracking-tight">🧬 Roni 3D Kimya Laboratuvarı</h2>
                </div>
            </header>

            <div class="p-4 md:p-6 max-w-7xl w-full mx-auto space-y-6 flex-1">
                <div class="flex bg-[#0f1117] p-1 rounded-xl border border-gray-900">
                    <button onclick="switchSubTab(0)" class="tab-btn active flex-1 text-center py-2.5 text-xs font-bold rounded-lg transition-all">🔬 3D Molekül Modülleri</button>
                    <button onclick="switchSubTab(1)" class="tab-btn flex-1 text-center py-2.5 text-xs font-bold rounded-lg transition-all text-gray-500 hover:text-gray-300">🧬 20 Amino Asit</button>
                    <button onclick="switchSubTab(2)" class="tab-btn flex-1 text-center py-2.5 text-xs font-bold rounded-lg transition-all text-gray-500 hover:text-gray-300">🧪 Temel Malzemeler</button>
                </div>

                <div id="subTabPanels">
                    <div class="sub-panel space-y-4">
                        <div class="bg-[#0f1117] p-4 rounded-xl border border-gray-900 flex flex-col sm:flex-row gap-3 items-center shadow-lg">
                            <input type="text" id="customMolInput" placeholder="Dilediğin molekülün adını yaz (Örn: aspirin, kafein, aseton)..." class="w-full bg-[#161922] text-xs font-bold rounded-xl p-3 border border-gray-800 text-white focus:outline-none">
                            <button onclick="searchCustomMolecule()" class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-xs px-5 py-3 rounded-xl shrink-0">Dinamik Çizim</button>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div class="md:col-span-1 bg-[#0f1117] p-4 rounded-xl border border-gray-900 space-y-4">
                                <select id="molSelector" onchange="handleMoleculeChange(this.value)" class="w-full bg-[#161922] p-2.5 text-xs font-bold rounded-xl border border-gray-800 text-indigo-400 focus:outline-none">
                                    <option value="crystal:nacl">NaCl (İyonik Kristal Örgüsü)</option>
                                    <option value="local:CH4">CH₄ (Metan - Düzgün Dörtyüzlü)</option>
                                    <option value="local:BeH2">BeH₂ (Berilyum Hidrür - Doğrusal)</option>
                                    <option value="local:BH3">BH₃ (Bor Trihidrür - Üçgen Düzlem)</option>
                                    <option value="local:H2">H₂ (Hidrojen Gazı)</option>
                                    <option value="local:O2">O₂ (Oksijen Gazı)</option>
                                    <option value="local:N2">N₂ (Azot Gazı)</option>
                                    <option value="local:H2O">H₂O (Su)</option>
                                    <option value="local:CO2">CO₂ (Karbondioksit)</option>
                                </select>
                                <div class="grid grid-cols-3 gap-2">
                                    <button onclick="setRenderStyle('ball', this)" class="style-btn active bg-[#161922] py-2 rounded text-[10px] font-bold border border-gray-800">Top-Çubuk</button>
                                    <button onclick="setRenderStyle('space', this)" class="style-btn bg-[#161922] py-2 rounded text-[10px] font-bold border border-gray-800">Uzay Dolgu</button>
                                    <button onclick="setRenderStyle('line', this)" class="style-btn bg-[#161922] py-2 rounded text-[10px] font-bold border border-gray-800">Tel Kafes</button>
                                </div>
                            </div>
                            <div class="md:col-span-2 bg-[#020617] rounded-xl border border-gray-900 relative min-h-[440px]">
                                <div id="molecule-viewer" class="w-full h-full absolute inset-0"></div>
                                <div class="absolute bottom-4 left-4 right-4 bg-gray-950/90 p-3 rounded-xl z-10 text-xs border border-gray-800">
                                    <span id="mol3d-label" class="font-bold text-white block mb-0.5 text-sm">NaCl (Kristal Örgü)</span>
                                    <p id="mol3d-info" class="text-gray-400"></p>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="sub-panel hidden grid grid-cols-1 md:grid-cols-3 gap-4" id="amino-grid"></div>
                    
                    <div class="sub-panel hidden grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4" id="lab-grid"></div>
                </div>
            </div>
        </main>
    </div>

    <div id="equipmentModal" class="fixed inset-0 bg-black/80 z-[200] hidden flex items-center justify-center p-4 backdrop-blur-sm">

            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-500 hover:text-white p-2 text-lg"><i class="fas fa-times"></i></button>
            <div class="flex justify-center bg-[#08090f] p-6 rounded-xl border border-gray-900/60" id="modalVisual">
                </div>
            <div>
                <h3 id="modalName" class="text-lg font-black text-indigo-400 font-['Space_Grotesk']">Malzeme Adı</h3>
                <p id="modalUse" class="text-xs text-gray-300 leading-relaxed mt-2 bg-[#161922] p-3 rounded-xl border border-gray-800 shadow-inner"></p>
                <div class="mt-3 bg-indigo-950/20 border border-indigo-900/30 p-3 rounded-xl text-[11px] text-indigo-300">
                    <i class="fas fa-info-circle mr-1"></i> <strong>ÖSYM / Müfredat Notu:</strong> 9. Sınıf Kimya bilimi ünite kazanımlarında doğrudan sorumludur.
                </div>
            </div>
        </div>
    </div>

    <script>
        let viewer = null; let currentStyle = 'ball';
        function toggleSidebar() { $('#sidebarPanel').toggleClass('-translate-x-full'); $('#sidebarOverlay').toggleClass('hidden'); }
        function switchSubTab(idx) { $('.tab-btn').removeClass('active bg-indigo-600 text-white').addClass('text-gray-500'); $('.tab-btn').eq(idx).addClass('active bg-indigo-600 text-white'); $('.sub-panel').addClass('hidden').eq(idx).removeClass('hidden'); }

        const LOCAL_MODELS = {
            "CH4": "5\nMethane\nC 0.0000 0.0000 0.0000\nH 0.6351 0.6351 0.6351\nH -0.6351 -0.6351 0.6351\nH -0.6351 0.6351 -0.6351\nH 0.6351 -0.6351 -0.6351",
            "BeH2": "3\nBeH2\nBe 0.0000 0.0000 0.0000\nH 0.0000 0.0000 1.3300\nH 0.0000 0.0000 -1.3300",
            "BH3": "4\nBH3\nB 0.0000 0.0000 0.0000\nH 0.0000 1.1900 0.0000\nH 1.0306 -0.5950 0.0000\nH -1.0306 -0.5950 0.0000",
            "H2": "2\nH2\nH 0.0000 0.0000 0.3700\nH 0.0000 0.0000 -0.3700",
            "O2": "2\nO2\nO 0.0000 0.0000 0.6050\nO 0.0000 0.0000 -0.6050",
            "N2": "2\nN2\nN 0.0000 0.0000 0.5500\nN 0.0000 0.0000 -0.5500",
            "H2O": "3\nWater\nO 0.0000 0.0000 0.1173\nH 0.0000 0.7572 -0.4692\nH 0.0000 -0.7572 -0.4692",
            "CO2": "3\nCO2\nC 0.0000 0.0000 0.0000\nO 0.0000 0.0000 1.1600\nO 0.0000 0.0000 -1.1600",
            "NH3": "4\nAmmonia\nN 0.0000 0.0000 0.1120\nH 0.0000 0.9380 -0.2610\nH 0.8120 -0.4690 -0.2610\nH -0.8120 -0.4690 -0.2610"
        };

        function generateNaClXYZ() {
            return `27\nNaCl\nNa 0 0 0\nCl 3 0 0\nNa 6 0 0\nCl 0 3 0\nNa 3 3 0\nCl 6 3 0\nNa 0 6 0\nCl 3 6 0\nNa 6 6 0\nCl 0 0 3\nNa 3 0 3\nCl 6 0 3\nNa 0 3 3\nCl 3 3 3\nNa 6 3 3\nCl 0 6 3\nNa 3 6 3\nCl 6 6 3\nNa 0 0 6\nCl 3 0 6\nNa 6 0 6\nCl 0 3 6\nNa 3 3 6\nCl 6 3 6\nNa 0 6 6\nCl 3 6 6\nNa 6 6 6`;
        }

        function handleMoleculeChange(val) {
            if (!viewer) return; viewer.clear();
            let label = $('#molSelector option:selected').text(); $('#mol3d-label').text(label);
            if (val === "crystal:nacl") {
                viewer.addModel(generateNaClXYZ(), "xyz");
                viewer.addBonds([{start:0, end:1},{start:1, end:2},{start:3, end:4},{start:4, end:5},{start:6, end:7},{start:7, end:8},
                                 {start:0, end:3},{start:1, end:4},{start:2, end:5},{start:3, end:6},{start:4, end:7},{start:5, end:8},
                                 {start:9, end:10},{start:10, end:11},{start:12, end:13},{start:13, end:14},{start:14, end:15}]);
                applyRenderStyle();
            } else if (val.startsWith("local:")) {
                viewer.addModel(LOCAL_MODELS[val.replace("local:", "")], "xyz"); applyRenderStyle();
            }
        }

        function searchCustomMolecule() {
            let name = $('#customMolInput').val().trim().toLowerCase(); if(!name) return;
            viewer.clear(); $('#mol3d-label').text(name.toUpperCase());
            $3Dmol.download("name:" + name, viewer, {}, function() { applyRenderStyle(); });
        }

        function setRenderStyle(styleName, btn) { $('.style-btn').removeClass('active border-indigo-500 text-indigo-400 bg-indigo-500/10'); $(btn).addClass('active border-indigo-500 text-indigo-400 bg-indigo-500/10'); currentStyle = styleName; applyRenderStyle(); }
        function applyRenderStyle() {
            if (!viewer) return; let config = {};
            if (currentStyle === 'ball') config = { stick: { radius: 0.15 }, sphere: { scale: 0.25 } };
            else if (currentStyle === 'space') config = { sphere: { scale: 0.8 } };
            else if (currentStyle === 'line') config = { line: { linewidth: 3 }, stick: { radius: 0.05 } };
            viewer.setStyle({}, config); viewer.render(); viewer.zoomTo();
        }

        // --- %100 GERÇEK VE DÜZGÜN ÇİZİLMİŞ VEKTOREL MALZEMELER LİSTESİ ---

            },
            {
                name: "Erlenmayer",

                svg: `<svg width="80" height="90" viewBox="0 0 80 90" fill="none" stroke="#818cf8" stroke-width="2.5"><path d="M33 15 L47 15 L47 30 L72 80 Q75 85 65 85 L15 85 Q5 85 8 80 L33 30 Z" fill="rgba(129,102,241,0.05)"/><line x1="30" y1="50" x2="50" y2="50" stroke-width="1.5"/><line x1="25" y1="65" x2="55" y2="65" stroke-width="1.5"/><line x1="20" y1="78" x2="60" y2="78" stroke-width="2"/></svg>`
            },

                name: "Cam Balon",
                use: "Çözelti hazırlama, saklama, kaynatma ve bazı damıtma düzeneklerinin omurgasını kurma amacıyla kullanılan yuvarlak gövdeli cam malzemedir.",
                svg: `<svg width="80" height="90" viewBox="0 0 80 90" fill="none" stroke="#818cf8" stroke-width="2.5"><circle cx="40" cy="55" r="25" fill="rgba(129,102,241,0.05)"/><path d="M34 32 L34 15 L46 15 L46 32" stroke-linecap="round"/></svg>`

                svg: `<svg width="80" height="90" viewBox="0 0 80 90" fill="none" stroke="#818cf8" stroke-width="2.5"><path d="M32 15 L48 15 L48 80 L55 80 L55 85 L25 85 L25 80 L32 80 Z" fill="rgba(129,102,241,0.05)"/><line x1="32" y1="25" x2="40" y2="25" stroke-width="1.5"/><line x1="32" y1="35" x2="44" y2="35" stroke-width="1.5"/><line x1="32" y1="45" x2="40" y2="45" stroke-width="1.5"/><line x1="32" y1="55" x2="44" y2="55" stroke-width="1.5"/><line x1="32" y1="65" x2="40" y2="65" stroke-width="1.5"/></svg>`

            {
                name: "Büret",

            },
            {
                name: "Spatül",
                use: "Toz ya da küçük parçacıklı katı kimyasal maddeleri şişelerinden güvenle almak ve aktarmak için kullanılan kaşık uçlu metal laboratuvar aracıdır.",

            },
            {
                name: "Puar",
                use: "Pipetlerin arka uç kısımlarına takılarak, ağızla çekilmesi tehlikeli asit/baz gibi sıvıların kontrollü çekilmesini sağlayan plastik üç vanalı pompadır.",
                svg: `<svg width="80" height="90" viewBox="0 0 80 90" fill="none" stroke="#818cf8" stroke-width="2.5"><circle cx="40" cy="45" r="16" fill="rgba(239,68,68,0.1)" stroke="#ef4444"/><path d="M40 29 L40 15 M40 61 L40 78" stroke="#ef4444" stroke-width="3"/></svg>`
            }
        ];

        function renderMaterials() {
            const container = $('#lab-grid'); container.empty();
            LAB_MATERIALS.forEach((mat, idx) => {
                container.append(`
                    <div onclick="openModal(${idx})" class="bg-[#0f1117] p-4 rounded-xl border border-gray-900 hover:border-indigo-500 transition-all cursor-pointer flex flex-col items-center justify-between shadow-md text-center group">
                        <div class="p-2 bg-gray-950 rounded-xl border border-gray-900 group-hover:scale-105 transition-transform">
                            ${mat.svg}
                        </div>
                        <div class="text-xs font-black text-gray-200 mt-2 font-['Space_Grotesk']">${mat.name}</div>
                        <span class="text-[9px] text-indigo-400 font-bold mt-1 uppercase tracking-wider block bg-indigo-500/5 px-2 py-0.5 rounded border border-indigo-500/10">Büyüt 🔍</span>
                    </div>
                `);
            });
        }

        function openModal(idx) {
            const mat = LAB_MATERIALS[idx];
            $('#modalVisual').html(mat.svg);
            $('#modalVisual svg').attr('width', '160').attr('height', '180'); // Modalda 2 kat büyük göster
            $('#modalName').text(mat.name);
            $('#modalUse').html(mat.use);
            $('#equipmentModal').removeClass('hidden');
        }

        function closeModal() { $('#equipmentModal').addClass('hidden'); }

        const AMINO = [
            {sym:'Gly',name:'Glisin',formula:'C₂H₅NO₂',desc:'En basit amino asit omurgasıdır. R grubu sadece tek bir Hidrojen atomudur.'},
            {sym:'Ala',name:'Alanin',formula:'C₃H₇NO₂',desc:'Metil yan zinciri içerir. Alifatik hidrofobik lise müfredat parametresidir.'},
            {sym:'Cys',name:'Sistein',formula:'C₃H₇NO₂S',desc:'Kükürt içerir, sülfhidril (-SH) bağ yapısı ile disülfit köprüleri kurar.'}
        ];

        $(document).ready(function() {
            viewer = $3Dmol.createViewer($('#molecule-viewer'), { backgroundColor: '#020617' });
            handleMoleculeChange("crystal:nacl");
            
            // Amino asitleri doldur
            AMINO.forEach(aa => {
                $('#amino-grid').append(`<div class="bg-[#0f1117] p-4 rounded-xl border border-gray-900 shadow-md"><div class="text-2xl font-black text-indigo-400 font-['Space_Grotesk']">${aa.sym}</div><div class="text-xs font-bold text-gray-200 mt-1">${aa.name} (${aa.formula})</div><p class="text-[11px] text-gray-500 mt-1 leading-relaxed">${aa.desc}</p></div>`);
            });

            renderMaterials();
            
            // Modal dışına tıklayınca kapatma aksiyonu
            $('#equipmentModal').click(function(e) { if(e.target === this) closeModal(); });
        });
    </script>
</body>
</html>
