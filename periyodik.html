<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roni — 3D Fütüristik Periyodik Tablo</title>
    
    <!-- iPHONE ANA EKRAN İKONU VE TAM EKRAN (PWA) AYARLARI -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RONI">
    <link rel="apple-touch-icon" href="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/512x512/2600.png?v=10">
    <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/512x512/2600.png?v=10">

    <!-- Google Fonts & Tailwind -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700;800&display=swap">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        :root {
            --bg: #05060a; --sf: #0b0d14; --sf2: #111420; --br: #1a1f32; --ac: #6366f1;
        }
        body { background: var(--bg); color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .p-grid { display: grid; grid-template-columns: repeat(18, minmax(36px, 1fr)); gap: 4px; overflow-x: auto; }
        
        /* Element Grupları Neon Renkleri */
        .am { border: 1px solid #ef4444; background: rgba(239,68,68,0.04); color: #f87171; } /* Alkali Metal */
        .aem { border: 1px solid #f97316; background: rgba(249,115,22,0.04); color: #fb923c; } /* Toprak Alkali */
        .tm { border: 1px solid #eab308; background: rgba(234,179,8,0.04); color: #facc15; } /* Geçiş Metali */
        .amtl { border: 1px solid #3b82f6; background: rgba(59,130,246,0.04); color: #60a5fa; } /* Ametal */
        .hl { border: 1px solid #22c55e; background: rgba(34,197,94,0.04); color: #4ade80; } /* Halojen */
        .sg { border: 1px solid #a855f7; background: rgba(168,85,247,0.04); color: #c084fc; } /* Soygaz */
        
        .element-card { aspect-ratio: 1; display: flex; flex-col; justify-content: space-between; padding: 3px; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
        .element-card:hover { transform: scale(1.08); z-index: 20; box-shadow: 0 0 12px currentColor; }
        
        /* 3D Yörünge Dönüş Animasyonları */
        .orbit-container { perspective: 800px; position: relative; width: 220px; height: 220px; }
        .orbit-ring {
            position: absolute; inset: 0; border: 1px dashed rgba(129,140,248,0.3);
            border-radius: 50%; transform-style: preserve-3d;
            animation: spin linear infinite;
        }
        @keyframes spin { from { transform: rotateX(70deg) rotateY(20deg) rotateZ(0deg); } to { transform: rotateX(70deg) rotateY(20deg) rotateZ(360deg); } }
        
        .electron {
            position: absolute; width: 6px; height: 6px; background: #38bdf8;
            border-radius: 50%; box-shadow: 0 0 8px #38bdf8;
            top: 0; left: 50%; margin-left: -3px;
        }
    </style>
</head>
<body class="overflow-x-hidden custom-scrollbar">

    <div class="flex h-screen overflow-hidden relative z-10">
        
        <!-- SIDEBAR MENÜ PANELİ -->
        <aside id="sidebarPanel" class="fixed inset-y-0 left-0 z-[100] w-64 bg-gray-950 flex flex-col justify-between border-r border-gray-900 transform -translate-x-full transition-transform duration-300 ease-in-out md:translate-x-0 md:static md:h-screen flex-shrink-0">
            <div class="p-5 overflow-y-auto flex-1">
                <div class="flex items-center justify-between mb-8">
                    <div class="flex items-center space-x-3">
                        <div class="bg-gradient-to-br from-amber-400 via-orange-500 to-red-500 text-slate-950 w-10 h-10 rounded-xl flex items-center justify-center text-xl shadow-lg relative">
                            <i class="fas fa-sun animate-[spin_20s_linear_infinite]"></i>
                        </div>
                        <span class="text-xl font-black text-white">RONI</span>
                    </div>
                    <button onclick="toggleSidebar()" class="text-gray-400 hover:text-white md:hidden p-2"><i class="fas fa-times text-xl"></i></button>
                </div>
                <nav class="space-y-1">
                    <a href="index.html" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-900 hover:text-white font-semibold text-sm transition">
                        <i class="fas fa-chart-pie w-5 text-center"></i> <span>Ana Sayfa</span>
                    </a>
                    <a href="periyodik.html" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl bg-indigo-600 text-white font-bold text-sm">
                        <i class="fas fa-table w-5 text-center"></i> <span>Periyodik Tablo</span>
                    </a>
                    <a href="laboratuvar.html" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-900 hover:text-white font-semibold text-sm transition">
                        <i class="fas fa-flask w-5 text-center"></i> <span>3D Araçlar</span>
                    </a>
                    <a href="simulasyon.html" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-900 hover:text-white font-semibold text-sm transition">
                        <i class="fas fa-laptop-code w-5 text-center"></i> <span>Simülasyonlar</span>
                    </a>
                    <a href="atlas.html" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-900 hover:text-white font-semibold text-sm transition">
                        <i class="fas fa-graduation-cap w-5 text-center"></i> <span>YÖK Atlas</span>
                    </a>
                </nav>
            </div>
        </aside>

        <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 z-40 hidden"></div>

        <!-- ANA EKREAN MATRİS VE 3D ATOM PANELİ -->
        <main class="flex-1 flex flex-col overflow-y-auto min-w-0">
            <header class="bg-[#05060a]/90 backdrop-blur border-b border-gray-900 px-6 py-4 flex justify-between items-center sticky top-0 z-30">
                <div class="flex items-center space-x-3">
                    <button onclick="toggleSidebar()" class="p-2 -ml-2 text-gray-400 hover:text-white md:hidden"><i class="fas fa-bars text-xl"></i></button>
                    <h2 class="text-lg md:text-xl font-extrabold text-white tracking-tight">⚛️ Roni Educalabs Interactive 3D Periodic Table</h2>
                </div>
            </header>

            <div class="p-4 md:p-6 max-w-7xl w-full mx-auto space-y-6 flex-1 flex flex-col lg:flex-row gap-6">
                
                <!-- SOL ALAN: PERİYODİK GRİD -->
                <div class="flex-1 bg-[#0b0d14] p-4 rounded-2xl border border-gray-900 overflow-x-auto shadow-2xl custom-scrollbar">
                    <div class="p-grid min-w-[760px]" id="periodicGrid">
                        <!-- JavaScript matrisi buraya inşa edecek -->
                    </div>
                </div>

                <!-- SAĞ ALAN: EDUCALABS 3D ATOM MOTORU -->
                <div class="w-full lg:w-80 bg-[#0b0d14] p-6 rounded-2xl border border-gray-900 flex flex-col items-center justify-between shadow-2xl shrink-0 min-h-[460px]">
                    <div class="text-center w-full">
                        <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest block mb-1">3D Bohr Elektron Modelleyicisi</span>
                        <h3 id="atomName" class="text-xl font-black text-white font-['Space_Grotesk']">Hidrojen</h3>
                        <div class="flex justify-center space-x-3 text-xs text-gray-400 mt-1">
                            <span>Z: <strong id="atomZ" class="text-indigo-400">1</strong></span>
                            <span>Kütle: <strong id="atomMass">1.008</strong></span>
                        </div>
                    </div>

                    <!-- Canlı 3D CSS Çekirdek ve Yörünge Motoru -->
                    <div class="my-6 relative flex items-center justify-center w-full">
                        <div class="orbit-container" id="orbitWrapper">
                            <!-- Dinamik 3D katman halkaları buraya eklenecek -->
                        </div>
                        <!-- Parlayan Proton Çekirdeği -->
                        <div class="absolute w-8 h-8 bg-gradient-to-br from-red-500 to-amber-500 rounded-full blur-sm opacity-50 animate-pulse"></div>
                        <div id="atomCenterSymbol" class="absolute font-['Space_Grotesk'] font-black text-xs text-white uppercase bg-gray-950/60 w-7 h-7 rounded-full flex items-center justify-center border border-gray-800">H</div>
                    </div>

                    <!-- Katman Elektron Dağılım İndeksi -->
                    <div class="w-full bg-[#111420] p-3 rounded-xl border border-gray-800 text-center">
                        <span class="text-[9px] font-bold text-gray-500 uppercase tracking-wider block mb-1">Elektron Katman Dağılımı</span>
                        <div id="atomShellConfig" class="font-mono font-bold text-sm text-sky-400">1</div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script>
        function toggleSidebar() { $('#sidebarPanel').toggleClass('-translate-x-full'); $('#sidebarOverlay').toggleClass('hidden'); }

        // --- %100 EKSİKSİZ KİMYA 1 ELEMENT HAVUZU VE KOORDİNAT GRİDİ ---
        const ELEMENTS = [
            { z:1,  symbol:"H",  name:"Hidrojen",      mass:"1.008",  shells:[1],       cat:"amtl", r:1, c:1 },
            { z:2,  symbol:"He", name:"Helyum",        mass:"4.002",  shells:[2],       cat:"sg",   r:1, c:18 },
            { z:3,  symbol:"Li", name:"Lityum",        mass:"6.941",  shells:[2,1],     cat:"am",   r:2, c:1 },
            { z:4,  symbol:"Be", name:"Berilyum",      mass:"9.012",  shells:[2,2],     cat:"aem",  r:2, c:2 },
            { z:5,  symbol:"B",  name:"Bor",           mass:"10.81",  shells:[2,3],     cat:"amtl", r:2, c:13 },
            { z:6,  symbol:"C",  name:"Karbon",        mass:"12.01",  shells:[2,4],     cat:"amtl", r:2, c:14 },
            { z:7,  symbol:"N",  name:"Azot",          mass:"14.01",  shells:[2,5],     cat:"amtl", r:2, c:15 },
            { z:8,  symbol:"O",  name:"Oksijen",       mass:"16.00",  shells:[2,6],     cat:"amtl", r:2, c:16 },
            { z:9,  symbol:"F",  name:"Flor",          mass:"19.00",  shells:[2,7],     cat:"hl",   r:2, c:17 },
            { z:10, symbol:"Ne", name:"Neon",          mass:"20.18",  shells:[2,8],     cat:"sg",   r:2, c:18 },
            { z:11, symbol:"Na", name:"Sodyum",        mass:"22.99",  shells:[2,8,1],   cat:"am",   r:3, c:1 },
            { z:12, symbol:"Mg", name:"Magnezyum",     mass:"24.31",  shells:[2,8,2],   cat:"aem",  r:3, c:2 },
            { z:13, symbol:"Al", name:"Alüminyum",     mass:"26.98",  shells:[2,8,3],   cat:"tm",   r:3, c:13 },
            { z:14, symbol:"Si", name:"Silisyum",      mass:"28.09",  shells:[2,8,4],   cat:"amtl", r:3, c:14 },
            { z:15, symbol:"P",  name:"Fosfor",        mass:"30.97",  shells:[2,8,5],   cat:"amtl", r:3, c:15 },
            { z:16, symbol:"S",  name:"Kükürt",        mass:"32.06",  shells:[2,8,6],   cat:"amtl", r:3, c:16 },
            { z:17, symbol:"Cl", name:"Klor",          mass:"35.45",  shells:[2,8,7],   cat:"hl",   r:3, c:17 },
            { z:18, symbol:"Ar", name:"Argon",         mass:"39.95",  shells:[2,8,8],   cat:"sg",   r:3, c:18 },
            { z:19, symbol:"K",  name:"Potasyum",      mass:"39.10",  shells:[2,8,8,1], cat:"am",   r:4, c:1 },
            { z:20, symbol:"Ca", name:"Kalsiyum",      mass:"40.08",  shells:[2,8,8,2], cat:"aem",  r:4, c:2 },
            { z:26, symbol:"Fe", name:"Demir",         mass:"55.84",  shells:[2,8,14,2],cat:"tm",   r:4, c:8 },
            { z:29, symbol:"Cu", name:"Bakır",         mass:"63.55",  shells:[2,8,18,1],cat:"tm",   r:4, c:11 },
            { z:30, symbol:"Zn", name:"Çinko",         mass:"65.38",  shells:[2,8,18,2],cat:"tm",   r:4, c:12 }
        ];

        function buildTable() {
            const grid = $('#periodicGrid'); grid.empty();
            
            // 4 periyot ve 18 grup koordinat hücresini tara
            for (let r = 1; r <= 4; r++) {
                for (let c = 1; c <= 18; c++) {
                    const el = ELEMENTS.find(e => e.r === r && e.c === c);
                    if (el) {
                        grid.append(`
                            <div onclick="selectElement(${el.z})" class="element-card ${el.cat}" style="grid-row:${r}; grid-column:${c};">
                                <span class="text-[8px] font-mono opacity-60 block leading-none">${el.z}</span>
                                <span class="text-sm font-black tracking-tighter text-center block leading-none my-0.5 font-['Space_Grotesk']">${el.symbol}</span>
                                <span class="text-[7px] block truncate text-center opacity-70 leading-none">${el.name}</span>
                            </div>
                        `);
                    } else {
                        grid.append(`<div style="grid-row:${r}; grid-column:${c};" class="opacity-0 pointer-events-none"></div>`);
                    }
                }
            }
        }

        // --- 3D ATOM YÖRÜNGE SİMÜLASYON MOTORU ---
        function selectElement(z) {
            const el = ELEMENTS.find(e => e.z === z); if(!el) return;
            
            // Bilgileri güncelle
            $('#atomName').text(el.name);
            $('#atomZ').text(el.z);
            $('#atomMass').text(el.mass);
            $('#atomCenterSymbol').text(el.symbol);
            $('#atomShellConfig').text(el.shells.join(' - '));
            
            // 3D Halkaları baştan oluştur
            const wrapper = $('#orbitWrapper'); wrapper.empty();
            
            el.shells.forEach((electronCount, shellIdx) => {
                const size = 60 + (shellIdx * 45); // Her yörünge halkasının çapı katlanarak genişler
                const ring = $(`<div class="orbit-ring" style="width:${size}px; height:${size}px; margin-left:-${size/2}px; margin-top:-${size/2}px; animation-duration:${4 + shellIdx*2}s;"></div>`);
                
                // Elektron kürelerini yörünge halkasının etrafına eşit açılarla diziyoruz
                for(let i=0; i<electronCount; i++) {
                    const angle = (360 / electronCount) * i;
                    const eKure = $(`<div class="electron" style="transform: rotate(${angle}deg) translateY(-${size/2}px);"></div>`);
                    ring.append(eKure);
                }
                wrapper.append(ring);
            });
        }

        $(document).ready(function() {
            buildTable();
            selectElement(1); // Varsayılan olarak Hidrojen 3D modelini yükle
        });
    </script>
</body>
</html>
