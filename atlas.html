<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roni — YÖK Atlas</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RONI">
    <link rel="apple-touch-icon" href="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/512x512/2600.png">
    <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/512x512/2600.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        :root { --bg: #08090f; --sf: #0f1117; --sf2: #161922; --ac: #6366f1; }
        body { background: var(--bg); color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .brow { display: grid; grid-template-columns: 1.5fr 1.5fr 80px 80px; align-items: center; padding: 12px; border-bottom: 1px solid #1e2535; font-size: 13px; }
        .brow.hdr { background: var(--sf2); font-weight: bold; color: #475569; }
    </style>
</head>
<body>
    <div class="max-w-7xl mx-auto p-4 md:p-6 space-y-4">
        <div class="bg-[#0f1117] p-5 rounded-2xl border border-gray-900">
            <label class="text-[10px] font-bold text-gray-500 uppercase block mb-1">Kurum veya Bölüm Filtreleme:</label>
            <input type="text" id="atlas-search" oninput="filterAtlas()" placeholder="Örn: Dicle, Tıp, Hukuk..." class="w-full bg-[#161922] p-3 rounded-xl border border-gray-800 text-xs text-white focus:outline-none focus:border-indigo-500">
        </div>
        <div class="bg-[#0f1117] rounded-2xl border border-gray-900 overflow-hidden shadow-2xl">
            <div id="atlas-table"></div>
        </div>
    </div>
    <script>
        const ATLAS_DATA = [
            { uni: 'Dicle Üniversitesi', bolum: 'Tıp Fakültesi', tur: 'SAY', sira: 19800 },
            { uni: 'Dicle Üniversitesi', bolum: 'Diş Hekimliği', tur: 'SAY', sira: 38200 },
            { uni: 'Dicle Üniversitesi', bolum: 'Eczacılık Fakültesi', tur: 'SAY', sira: 53500 },
            { uni: 'Dicle Üniversitesi', bolum: 'Hukuk Fakültesi', tur: 'EA', sira: 46000 },
            { uni: 'Dicle Üniversitesi', bolum: 'Kimya Öğretmenliği', tur: 'SAY', sira: 185000 },
            { uni: 'İstanbul Üniversitesi', bolum: 'Tıp Fakültesi', tur: 'SAY', sira: 8420 },
            { uni: 'Hacettepe Üniversitesi', bolum: 'Tıp Fakültesi', tur: 'SAY', sira: 12100 }
        ];
        function filterAtlas() {
            const q = $('#atlas-search').val().toLowerCase().trim();
            const tbl = $('#atlas-table'); tbl.empty();
            tbl.append(`<div class="brow hdr"><div>Üniversite</div><div>Program</div><div>Tür</div><div class="text-right">Sıralama</div></div>`);
            const filtered = ATLAS_DATA.filter(d => !q || d.uni.toLowerCase().includes(q) || d.bolum.toLowerCase().includes(q));
            filtered.forEach(d => {
                tbl.append(`<div class="brow"><div class="font-bold text-gray-200">${d.uni}</div><div class="text-gray-400">${d.bolum}</div><div><span class="bg-indigo-500/10 text-indigo-400 px-2 py-0.5 rounded text-[10px]">${d.tur}</span></div><div class="text-right text-gray-300 font-mono">${d.sira.toLocaleString('tr-TR')}</div></div>`);
            });
        }
        $(document).ready(function() { filterAtlas(); });
    </script>
</body>
</html>
