<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roni — YÖK Atlas Robotu</title>
    
    <!-- iPHONE ANA EKRAN İKONU VE TAM EKRAN (PWA) AYARLARI -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RONI">
    <link rel="apple-touch-icon" href="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/512x512/2600.png">
    <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/512x512/2600.png">

    <!-- Google Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700;800&display=swap">
    <!-- Tailwind CSS & FontAwesome CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        :root {
            --bg: #08090f; --sf: #0f1117; --sf2: #161922; --br: #1e2535; --ac: #6366f1; --ac2: #818cf8;
        }
        body { background: var(--bg); color: #f1f5f9; font-family: 'Inter', sans-serif; }
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image: radial-gradient(circle at 1px 1px, rgba(99,102,241,.06) 1px, transparent 0);
            background-size: 28px 28px; pointer-events: none; z-index: 0;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: var(--br); border-radius: 3px; }
        .brow { display: grid; grid-template-columns: 1.2fr 1.2fr 60px 90px; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--br); font-size: 13px; gap: 5px; }
        .brow.hdr { background: var(--sf2); font-size: 10px; font-weight: 700; color: #475569; text-transform: uppercase; }
        .bpc { font-weight: 700; color: var(--ac2); text-align: right; }
        @media(max-width: 640px) {
            .brow { grid-template-columns: 1fr 1fr 70px; }
            .hide-mobile { display: none; }
        }
    </style>
</head>
<body class="overflow-x-hidden custom-scrollbar">

    <div class="flex h-screen overflow-hidden relative z-10">
        
        <!-- SIDEBAR MENÜ PANELİ -->
        <aside id="sidebarPanel" class="fixed inset-y-0 left-0 z-[100] w-64 bg-gray-950 flex flex-col justify-between border-r border-gray-900 transform -translate-x-full transition-transform duration-300 ease-in-out md:translate-x-0 md:static md:h-screen flex-shrink-0">
            <div class="p-5 overflow-y-auto flex-1 custom-scrollbar">
                <div class="flex items-center justify-between mb-8">
                    <!-- PARLAYAN GÜNEŞ LOGO -->
                    <div class="flex items-center space-x-3">
                        <div class="bg-gradient-to-br from-amber-400 via-orange-500 to-red-500 text-slate-950 w-10 h-10 rounded-xl flex items-center justify-center text-xl shadow-lg relative">
                            <i class="fas fa-sun animate-[spin_20s_linear_infinite]"></i>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-xl font-black tracking-wider text-white leading-none">RONI</span>
                            <span class="text-[9px] font-bold text-gray-500 tracking-widest mt-0.5 uppercase">Aydınlık Merkezi</span>
                        </div>
                    </div>
                    <button onclick="toggleSidebar()" class="text-gray-400 hover:text-white md:hidden p-2"><i class="fas fa-times text-xl"></i></button>
                </div>
                
                <nav class="space-y-1">
                    <a href="index.html" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-900 hover:text-white font-semibold text-sm transition">
                        <i class="fas fa-chart-pie w-5 text-center"></i> <span>Ana Sayfa</span>
                    </a>
                    <a href="periyodik.html" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-900 hover:text-white font-semibold text-sm transition">
                        <i class="fas fa-table w-5 text-center"></i> <span>Periyodik Tablo</span>
                    </a>
                    <a href="laboratuvar.html" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-900 hover:text-white font-semibold text-sm transition">
                        <i class="fas fa-flask w-5 text-center"></i> <span>3D Araçlar</span>
                    </a>
                    <a href="simulasyon.html" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-900 hover:text-white font-semibold text-sm transition">
                        <i class="fas fa-laptop-code w-5 text-center"></i> <span>Simülasyonlar</span>
                    </a>
                    <a href="atlas.html" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl bg-indigo-600 text-white font-bold text-sm">
                        <i class="fas fa-graduation-cap w-5 text-center"></i> <span>YÖK Atlas</span>
                    </a>
                </nav>
            </div>
            <div class="p-5 border-t border-gray-800 flex items-center space-x-3 bg-gray-950/40 flex-shrink-0">
                <div class="w-10 h-10 bg-indigo-950 rounded-full flex items-center justify-center font-black text-indigo-400">M</div>
                <div><h4 class="text-sm font-bold text-gray-200">Medeni Gökalp</h4><span class="text-xs text-gray-500">Kimya Öğretmeni</span></div>
            </div>
        </aside>

        <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 z-40 hidden md:hidden"></div>

        <!-- ANA PANEL PORTAL -->
        <main class="flex-1 flex flex-col overflow-y-auto min-w-0">
            <header class="bg-[#08090f]/90 backdrop-blur border-b border-gray-900 px-6 py-4 flex justify-between items-center sticky top-0 z-30">
                <div class="flex items-center space-x-3">
                    <button onclick="toggleSidebar()" class="p-2 -ml-2 text-gray-400 hover:text-white md:hidden"><i class="fas fa-bars text-xl"></i></button>
                    <h2 class="text-lg md:text-xl font-extrabold text-white tracking-tight">🎓 Roni YÖK Atlas Tercih Portalı</h2>
                </div>
            </header>

            <div class="p-4 md:p-6 max-w-7xl w-full mx-auto space-y-6 flex-1">
                <div class="bg-[#0f1117] p-5 rounded-2xl border border-gray-900 shadow-xl space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-gray-500 uppercase block mb-1">Üniversite veya Lisans Programı Ara:</label>
                        <input type="text" id="atlasSearch" oninput="filterAtlas()" placeholder="Örn: Dicle, Tıp, İTÜ, Hukuk, Mühendislik..." class="w-full bg-[#161922] p-3.5 text-xs rounded-xl border border-gray-800 focus:outline-none focus:border-indigo-500 text-gray-100 font-bold">
                    </div>
                </div>

                <!-- Sonuçların Çizileceği Matris -->
                <div class="bg-[#0f1117] rounded-2xl border border-gray-900 overflow-hidden shadow-2xl">
                    <div id="atlas-table"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function toggleSidebar() { $('#sidebarPanel').toggleClass('-translate-x-full'); $('#sidebarOverlay').toggleClass('hidden'); }

        // Genişletilmiş Bölge ve Ulusal Üniversiteler Veritabanı
        const ATLAS_DATABASE = [
            { uni: 'Dicle Üniversitesi', bolum: 'Tıp Fakültesi', tur: 'SAY', sira: 19800 },
            { uni: 'Dicle Üniversitesi', bolum: 'Diş Hekimliği', tur: 'SAY', sira: 38200 },
            { uni: 'Dicle Üniversitesi', bolum: 'Eczacılık Fakültesi', tur: 'SAY', sira: 53500 },
            { uni: 'Dicle Üniversitesi', bolum: 'Hukuk Fakültesi', tur: 'EA', sira: 46000 },
            { uni: 'Dicle Üniversitesi', bolum: 'İlköğretim Matematik Öğrt.', tur: 'EA', sira: 56000 },
            { uni: 'Dicle Üniversitesi', bolum: 'Kimya Öğretmenliği', tur: 'SAY', sira: 185000 },
            { uni: 'Dicle Üniversitesi', bolum: 'Hemşirelik Yüksekokulu', tur: 'SAY', sira: 210000 },
            { uni: 'İstanbul Teknik Üniversitesi (İTÜ)', bolum: 'Bilgisayar Mühendisliği', tur: 'SAY', sira: 2850 },
            { uni: 'Orta Doğu Teknik Üniversitesi (ODTÜ)', bolum: 'Kimya Mühendisliği', tur: 'SAY', sira: 42000 },
            { uni: 'Hacettepe Üniversitesi', bolum: 'Tıp Fakültesi (İngilizce)', tur: 'SAY', sira: 2400 },
            { uni: 'Gazi Üniversitesi', bolum: 'Eczacılık Fakültesi', tur: 'SAY', sira: 49000 },
            { uni: 'Ege Üniversitesi', bolum: 'Diş Hekimliği', tur: 'SAY', sira: 32000 }
        ];

        function filterAtlas() {
            const query = $('#atlasSearch').val().toLowerCase().trim();
            const tbl = $('#atlas-table'); tbl.empty();

            tbl.append(`
                <div class="brow hdr bg-[#161922]/80 text-gray-400 font-bold border-b border-gray-900">
                    <div>Üniversite / Kurum</div><div>Lisans Programı</div><div class="hide-mobile">Tür</div><div class="text-right">2025 Sıralama</div>
                </div>
            `);

            const filtered = ATLAS_DATABASE.filter(d => !query || d.uni.toLowerCase().includes(query) || d.bolum.toLowerCase().includes(query));

            if(!filtered.length && query) {
                // EĞER ARANAN BULUNAMAZSA DİNAMİK OLARAK RESMİ YÖK ATLAS DEEP-LINK BUTONU ÇIKARIR (Eksikliği Önler)
                tbl.append(`
                    <div class="p-8 text-center space-y-4">
                        <p class="text-xs text-gray-500 italic">"${query}" araması yerel hızlı filtrede bulunamadı. Resmi YÖK Atlas havuzundan canlı aratabilirsiniz:</p>
                        <a href="https://yokatlas.yok.gov.tr/lisans-atlas.php?y=${encode编(query)}" target="_blank" class="inline-flex items-center space-x-2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-xs px-5 py-3 rounded-xl shadow-lg transition-all">
                            <i class="fas fa-external-link-alt"></i> <span>YÖK Atlas Lisans Atlası'nda Canlı Ara</span>
                        </a>
                    </div>
                `);
                return;
            }

            filtered.forEach(d => {
                tbl.append(`
                    <div class="brow hover:bg-[#161922]/30 transition-colors">
                        <div class="font-bold text-gray-200">${d.uni}</div>
                        <div class="text-gray-400">${d.bolum}</div>
                        <div class="hide-mobile"><span class="bg-indigo-500/10 text-indigo-400 px-2 py-0.5 rounded text-[10px] font-bold border border-indigo-500/20">${d.tur}</span></div>
                        <div class="bpc font-mono text-sm">${d.sira.toLocaleString('tr-TR')}</div>
                    </div>
                `);
            });
        }

        // Güvenli URL kodlama helper fonksiyonu
        function encode编(str) { return encodeURIComponent(str); }

        $(document).ready(function() { filterAtlas(); });
    </script>
</body>
</html>
